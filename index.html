<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPU | التسجيل الإلكتروني</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:'Tajawal';background:#f0f4f8;margin:0;padding-top:80px;}

.navbar {backdrop-filter: blur(12px);background: rgba(0,0,0,0.6);}

#loader {position:fixed;width:100%;height:100%;background:#0f172a;display:flex;justify-content:center;align-items:center;z-index:9999;}
.spinner {width:50px;height:50px;border:5px solid #334155;border-top:5px solid #fff;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin {to { transform:rotate(360deg); }}

.hero {height:320px;position:relative;overflow:hidden;}
.hero img {width:100%;height:100%;object-fit:cover;filter:brightness(.6);transition:.5s;}

.overlay {position:absolute;width:100%;height:100%;background:rgba(0,0,0,.4);}

.hero-content {position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:white;}

.card {background:white;padding:25px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.1);transition:.4s;}
.card:hover {transform:translateY(-8px) scale(1.02);}

.input {width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;}

.btn {background:#1e295a;color:white;padding:15px;border-radius:10px;width:100%;}

.preview img {width:90px;height:90px;border-radius:10px;}

#toast {position:fixed;top:20px;right:20px;background:#1e295a;color:white;padding:12px;border-radius:10px;opacity:0;transition:.3s;}

.fade {opacity:0;transform:translateY(30px);transition:.8s;}
.fade.show {opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>
<div id="toast"></div>

<!-- NAVBAR -->
<nav class="navbar fixed w-full top-0 z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">

<div class="flex items-center gap-2">
<img src="logo.png" class="w-8 h-8">
<h2 class="text-white font-bold">SPU</h2>
</div>

<div class="hidden md:flex gap-6 text-white">
<a href="#">الرئيسية</a>
<a href="#form">التسجيل</a>
<a href="track.html">تتبع الطلب</a>
</div>

<button onclick="scrollToForm()" class="hidden md:block bg-red-600 px-4 py-2 rounded text-white">
قدّم الآن
</button>

<button onclick="toggleMenu()" class="md:hidden text-white text-2xl">☰</button>

</div>

<div id="mobileMenu" class="hidden flex-col bg-black text-white text-center py-5 space-y-4">
<a href="#">الرئيسية</a>
<a href="#form">التسجيل</a>
<a href="track.html">تتبع الطلب</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<img src="logo.png">
<div class="overlay"></div>

<div class="hero-content">
<h1 class="text-3xl font-bold">ابدأ مستقبلك مع SPU 🎓</h1>
<p class="mt-2">جامعة رائدة بمستوى عالمي</p>
<button onclick="scrollToForm()" class="mt-4 bg-red-700 px-6 py-2 rounded">قدّم الآن</button>
</div>
</div>

<!-- STATS -->
<div class="max-w-6xl mx-auto mt-12 px-4 text-center grid md:grid-cols-3 gap-6">
<div class="card fade">
<h2 class="text-4xl font-bold text-[#1e295a]" data-count="2005">0</h2>
<p>📅 سنة التأسيس</p>
</div>
<div class="card fade">
<h2 class="text-4xl font-bold text-[#1e295a]" data-count="5000">0</h2>
<p>👨‍🎓 عدد الطلاب</p>
</div>
<div class="card fade">
<h2 class="text-4xl font-bold text-[#1e295a]" data-count="6">0</h2>
<p>🎓 عدد الكليات</p>
</div>
</div>

<!-- FORM -->
<div id="form" class="max-w-2xl mx-auto mt-10 px-4">
<div class="card">

<h2 class="text-xl text-center mb-6">استمارة التسجيل</h2>

<input id="name" class="input mb-3" placeholder="الاسم الثلاثي">
<input id="email" class="input mb-3" placeholder="البريد الإلكتروني">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<select id="major" class="input mb-5">
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
<option>هندسة المعلوماتية</option>
<option>الهندسة البترولية</option>
<option>إدارة الأعمال</option>
</select>

<h3 class="mb-3">📁 الوثائق</h3>

<input type="file" onchange="upload(this,'cert')" class="input mb-2">
<div id="certPreview"></div>

<input type="file" onchange="upload(this,'idimg')" class="input mb-2">
<div id="idimgPreview"></div>

<input type="file" onchange="upload(this,'personal')" class="input mb-2">
<div id="personalPreview"></div>

<div class="bg-blue-50 p-4 text-center mt-4">
<p>💳 500$</p>

<div class="flex justify-center">
<img src="https://i.ibb.co/JWtdDy1m/qr.png" class="w-40 rounded shadow">
</div>

<input id="transfer" class="input mt-2" placeholder="رقم التحويل">
</div>

<button class="btn mt-5" onclick="send()">إرسال</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDYZC...",
authDomain:"student-system-13431.firebaseapp.com",
projectId:"student-system-13431"
});

const db = getFirestore(app);
const API_KEY="bfa4cc0d29fb46535a67fd3dbe8de3bc";

let uploaded={};

function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,3000);
}

window.upload = async(input,key)=>{
const file=input.files[0];
if(!file)return;

document.getElementById(key+"Preview").innerHTML=`<img src="${URL.createObjectURL(file)}" class="w-20 h-20 rounded shadow">`;

const fd=new FormData();
fd.append("image",file);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{method:"POST",body:fd});
const data=await res.json();

uploaded[key]=data.data.url;
};

window.send = async()=>{
const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;
const major=document.getElementById("major").value;

if(!name || !email || !phone || !major){
toast("❌ عبي كل الحقول");
return;
}

if(!uploaded.cert || !uploaded.idimg || !uploaded.personal){
toast("❌ ارفع كل الصور");
return;
}

await addDoc(collection(db,"students"),{
name,email,phone,major,
cert:uploaded.cert,
id:uploaded.idimg,
personal:uploaded.personal,
status:"قيد المراجعة"
});

toast("✅ تم الإرسال");

setTimeout(()=>window.location.href="success.html",1500);
};

window.toggleMenu=()=>{
document.getElementById("mobileMenu").classList.toggle("hidden");
};

window.scrollToForm=()=>{
document.getElementById("form").scrollIntoView({behavior:"smooth"});
};

/* LOADER */
window.addEventListener("load",()=>{
setTimeout(()=>document.getElementById("loader").style.display="none",800);
});

/* COUNTER */
function animateCounter(el){
const target = +el.getAttribute("data-count");
let count = 0;
const step = target / 50;

function update(){
count += step;
if(count < target){
el.innerText = Math.floor(count);
requestAnimationFrame(update);
}else{
el.innerText = target;
}
}
update();
}
document.querySelectorAll("[data-count]").forEach(animateCounter);

/* FADE */
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("show")});
});
document.querySelectorAll(".fade").forEach(el=>observer.observe(el));

/* PARALLAX */
window.addEventListener("scroll",()=>{
const hero=document.querySelector(".hero img");
hero.style.transform=`translateY(${window.scrollY*0.3}px) scale(1.05)`;
});

</script>

</body>
  </html>
