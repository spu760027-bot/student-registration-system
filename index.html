<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPU Registration</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Tajawal', sans-serif;
  background:#f1f5f9;
}

/* Card */
.card {
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

/* Inputs */
.input {
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  transition:0.3s;
}

.input:focus {
  border-color:#1e295a;
  box-shadow:0 0 0 2px rgba(30,41,90,0.2);
  outline:none;
}

/* Button */
.btn {
  background:#1e295a;
  color:white;
  padding:12px;
  border-radius:10px;
  transition:0.3s;
}

.btn:hover {
  background:#8e1a1e;
}

/* Progress */
.progress {
  height:6px;
  background:#e2e8f0;
  border-radius:10px;
}

.progress-bar {
  height:100%;
  background:linear-gradient(90deg,#1e295a,#8e1a1e);
  width:33%;
  transition:0.4s;
}

/* Animation */
.step {
  animation: fade 0.4s ease;
}

@keyframes fade {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}

/* Shake */
.shake {
  animation: shake 0.3s;
}

@keyframes shake {
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}

.error {
  border-color:red !important;
}

.hidden { display:none; }

.preview img {
  width:80px;
  height:80px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="max-w-2xl mx-auto mt-10 px-4">
<div id="card" class="card">

<h2 class="text-xl font-bold text-center mb-4">🎓 التسجيل الإلكتروني</h2>

<div class="progress mb-6">
  <div id="bar" class="progress-bar"></div>
</div>

<!-- STEP 1 -->
<div id="step1" class="step">
  <input id="name" class="input mb-3" placeholder="الاسم الثلاثي">
  <input id="national" class="input mb-3" placeholder="الرقم الوطني">
  <input id="phone" class="input mb-3" placeholder="رقم الهاتف">

  <button class="btn w-full" onclick="nextStep(2)">التالي ➡️</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden step">
  <select id="major" class="input mb-4">
    <option value="">اختر الكلية</option>
    <option>الطب</option>
    <option>الهندسة</option>
  </select>

  <div class="flex justify-between">
    <button class="btn" onclick="nextStep(1)">⬅️ رجوع</button>
    <button class="btn" onclick="nextStep(3)">التالي ➡️</button>
  </div>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden step">
  <input type="file" id="cert" class="input mb-2">
  <input type="file" id="idimg" class="input mb-2">
  <input type="file" id="personal" class="input mb-3">

  <button class="btn w-full" onclick="send()">🚀 إرسال</button>
  <button class="btn w-full mt-2" onclick="nextStep(2)">⬅️ رجوع</button>
</div>

<p id="msg" class="text-center mt-3 text-red-500"></p>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
});

const db = getFirestore(app);

/* Validation */
function validateStep(step){

  let valid = true;
  let fields = [];

  if (step === 1) {
    fields = ["name","national","phone"];
  }

  if (step === 2) {
    fields = ["major"];
  }

  fields.forEach(id=>{
    const el = document.getElementById(id);
    el.classList.remove("error");

    if (!el.value) {
      el.classList.add("error");
      valid = false;
    }
  });

  return valid;
}

/* Navigation */
window.nextStep = (n)=>{

  if (n > 1 && !validateStep(n-1)) {
    document.getElementById("msg").innerText = "❌ يرجى تعبئة الحقول";
    document.getElementById("card").classList.add("shake");

    setTimeout(()=>{
      document.getElementById("card").classList.remove("shake");
    },300);

    return;
  }

  document.getElementById("msg").innerText = "";

  document.querySelectorAll("[id^='step']").forEach(s=>s.classList.add("hidden"));
  document.getElementById("step"+n).classList.remove("hidden");

  document.getElementById("bar").style.width =
    n===1?"33%":n===2?"66%":"100%";
};

/* Send */
window.send = async ()=>{

  if (!validateStep(2)) return;

  document.getElementById("msg").innerText="⏳ جاري الإرسال...";

  await addDoc(collection(db,"students"),{
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    major: document.getElementById("major").value,
    status:"⏳ قيد المراجعة"
  });

  window.location.href="success.html";
};

</script>

</body>
</html>
