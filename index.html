<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التسجيل الإلكتروني | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body { font-family:'Tajawal', sans-serif; background:#f0f4f8; margin:0; }

/* بانر */
.hero { width:100%; height:220px; overflow:hidden; position:relative; }
.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.5s;
  filter: contrast(1.1) brightness(1.1);
}
.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to right, rgba(30,41,90,0.05), rgba(142,26,30,0.05));
}

/* كارد */
.card {
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  animation:fadeUp .6s;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px);} }

/* عناصر */
.input {
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
}
.input:focus {
  border-color:#1e295a;
  box-shadow:0 0 0 2px rgba(30,41,90,0.1);
  outline:none;
}

.btn {
  background:#1e295a;
  color:white;
  padding:15px;
  border-radius:10px;
  width:100%;
  transition:.3s;
}
.btn:hover { background:#8e1a1e; transform:translateY(-2px); }

.preview img {
  width:90px;
  height:90px;
  border-radius:10px;
  margin-top:5px;
}

/* Toast */
#toast {
position:fixed;
top:20px;
right:20px;
background:#1e295a;
color:white;
padding:15px;
border-radius:10px;
opacity:0;
transform:translateY(-20px);
transition:.4s;
}

/* Progress */
.progress { height:6px; background:#e2e8f0; border-radius:10px; overflow:hidden; }
.progress-bar { height:100%; width:0%; background:#1e295a; }
</style>
</head>

<body>

<div id="toast"></div>

<!-- بانر -->
<div class="hero">
  <img id="heroImg" src="logo.png">
  <div class="overlay"></div>
</div>

<!-- الفورم -->
<div class="max-w-2xl mx-auto mt-10 px-4">
<div class="card">

<h2 class="text-xl font-bold text-center mb-6" style="color:#1e295a;">
استمارة التسجيل الإلكتروني - 2026
</h2>

<input id="name" class="input mb-3" placeholder="الاسم الثلاثي">
<input id="email" class="input mb-3" placeholder="البريد الإلكتروني">
<input id="national" class="input mb-3" placeholder="الرقم الوطني">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<select id="major" class="input mb-5">
<option value="">اختر الكلية المطلوبة</option>

<optgroup label="🏥 الكليات الطبية">
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
</optgroup>

<optgroup label="💻 الكليات الهندسية">
<option>هندسة المعلوماتية والاتصالات</option>
<option>الهندسة البترولية</option>
</optgroup>

<optgroup label="💼 الكليات الإدارية">
<option>إدارة الأعمال</option>
</optgroup>
</select>

<!-- 📁 الوثائق -->
<h3 class="font-bold mb-3">📁 الوثائق المطلوبة</h3>

<label>📄 صورة الشهادة الثانوية</label>
<input type="file" onchange="upload(this,'cert')" class="input mb-2">
<div id="certPreview" class="preview"></div>
<div id="certBar" class="progress hidden mb-4"><div class="progress-bar"></div></div>

<label>🪪 صورة الهوية</label>
<input type="file" onchange="upload(this,'idimg')" class="input mb-2">
<div id="idimgPreview" class="preview"></div>
<div id="idimgBar" class="progress hidden mb-4"><div class="progress-bar"></div></div>

<label>👤 صورة شخصية</label>
<input type="file" onchange="upload(this,'personal')" class="input mb-2">
<div id="personalPreview" class="preview"></div>
<div id="personalBar" class="progress hidden mb-4"><div class="progress-bar"></div></div>

<div class="bg-blue-50 p-4 rounded-xl text-center mt-4">
<p class="font-bold mb-2">💳 رسوم التسجيل 500$</p>
<img src="https://i.ibb.co/JWtdDy1m/qr.png" style="width:180px;margin:auto">
<input id="transfer" class="input mt-3" placeholder="رقم عملية التحويل">
</div>

<button class="btn mt-5" onclick="send()">إرسال الطلب</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain:"student-system-13431.firebaseapp.com",
  projectId:"student-system-13431"
});

const db = getFirestore(app);
emailjs.init("YOUR_PUBLIC_KEY");

const apiKey="bfa4cc0d29fb46535a67fd3dbe8de3bc";
let uploaded={};

/* Toast */
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.opacity=1;
  t.style.transform="translateY(0)";
  setTimeout(()=>{t.style.opacity=0; t.style.transform="translateY(-20px)"},3000);
}

/* Upload */
window.upload = async(input,key)=>{
  const file=input.files[0];
  if(!file)return;

  document.getElementById(key+"Preview").innerHTML=`<img src="${URL.createObjectURL(file)}">`;

  const bar=document.querySelector("#"+key+"Bar .progress-bar");
  document.getElementById(key+"Bar").classList.remove("hidden");

  let p=0;
  const i=setInterval(()=>{p+=10;bar.style.width=p+"%"},100);

  const fd=new FormData();
  fd.append("image",file);

  const res=await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`,{
    method:"POST",body:fd
  });

  const data=await res.json();
  clearInterval(i);
  bar.style.width="100%";

  uploaded[key]=data.data.url;
};

/* Send */
window.send = async()=>{
  const name=document.getElementById("name").value;
  const email=document.getElementById("email").value;
  const phone=document.getElementById("phone").value;
  const major=document.getElementById("major").value;

  if(!uploaded.cert || !uploaded.idimg || !uploaded.personal){
    toast("❌ ارفع كل الصور");
    return;
  }

  toast("⏳ جاري الإرسال...");

  await addDoc(collection(db,"students"),{
    name,
    email,
    phone,
    major,
    cert:uploaded.cert,
    id:uploaded.idimg,
    personal:uploaded.personal,
    status:"⏳ قيد المراجعة"
  });

  emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
    user_name:name,
    user_email:email
  });

  toast("✅ تم الإرسال");
  setTimeout(()=>window.location.href="success.html",1500);
};

/* Parallax */
window.addEventListener("scroll",()=>{
  heroImg.style.transform=`translateY(${scrollY*0.2}px) scale(1.05)`
});

</script>

</body>
</html>
