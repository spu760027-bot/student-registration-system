<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPU | التسجيل الإلكتروني</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Tajawal', sans-serif;
  background:#f0f4f8;
  margin:0;
  padding-top:80px;
}

.navbar {
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}

.hero { height:320px; position:relative; }
.hero img { width:100%; height:100%; object-fit:cover; filter:brightness(.6); }

.overlay {
  position:absolute;
  width:100%;height:100%;
  background:rgba(0,0,0,.4);
}

.hero-content {
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:white;text-align:center;
}

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.input {
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
}

.btn {
  background:#1e295a;
  color:white;
  padding:15px;
  border-radius:10px;
  width:100%;
}

.preview img {
  width:90px;height:90px;border-radius:10px;margin:5px;
}

#toast {
position:fixed;
top:20px;right:20px;
background:#1e295a;color:white;
padding:12px;border-radius:10px;
opacity:0;transition:.3s;
}
</style>
</head>

<body>

<div id="toast"></div>

<!-- NAV -->
<nav class="navbar fixed w-full top-0 z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4 text-white">
<b>SPU</b>
<button onclick="scrollToForm()" class="bg-red-600 px-4 py-2 rounded">قدّم الآن</button>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<img src="https://spu.edu.sy/sites/default/files/2023-10/banner.jpg"
onerror="this.src='https://images.unsplash.com/photo-1607237138185-eedd9c632b0b'">
<div class="overlay"></div>
<div class="hero-content">
<h1 class="text-3xl font-bold">ابدأ مستقبلك مع SPU 🎓</h1>
</div>
</div>

<!-- FORM -->
<div id="form" class="max-w-2xl mx-auto mt-10 px-4">
<div class="card">

<h2 class="text-xl text-center mb-6">استمارة التسجيل</h2>

<input id="name" class="input mb-3" placeholder="الاسم">
<input id="email" class="input mb-3" placeholder="الإيميل">
<input id="phone" class="input mb-3" placeholder="الهاتف">

<select id="major" class="input mb-4">
<option value="">اختر الكلية</option>
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
<option>التمريض</option>
<option>الهندسة المعلوماتية</option>
<option>الهندسة المدنية</option>
<option>الهندسة المعمارية</option>
<option>إدارة الأعمال</option>
<option>العلاقات الدولية</option>
</select>

<!-- 🔥 الوثائق -->
<h3 class="font-bold mb-3">📁 الوثائق</h3>

<label>📄 صورة الشهادة الثانوية</label>
<input type="file" onchange="upload(this,'cert')" class="input mb-2">
<div id="certPreview" class="preview"></div>

<label>🪪 صورة الهوية</label>
<input type="file" onchange="upload(this,'idimg')" class="input mb-2">
<div id="idimgPreview" class="preview"></div>

<label>👤 صورة شخصية</label>
<input type="file" onchange="upload(this,'personal')" class="input mb-2">
<div id="personalPreview" class="preview"></div>

<!-- الدفع -->
<div class="bg-blue-50 p-4 text-center mt-4 rounded">

<p>💳 رسوم 500$</p>

<div style="display:flex;justify-content:center;">
<img src="https://i.ibb.co/JWtdDy1m/qr.png" width="180">
</div>

<label class="mt-3">📸 إثبات الدفع</label>
<input type="file" onchange="upload(this,'payment')" class="input mt-2">
<div id="paymentPreview" class="preview"></div>

<input id="transfer" class="input mt-2" placeholder="رقم التحويل">

</div>

<button class="btn mt-4" onclick="send()">إرسال الطلب</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID"
});

const db = getFirestore(app);
const API_KEY="YOUR_IMGBB_KEY";

let uploaded={};

function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,3000);
}

window.upload = async(input,key)=>{
const file=input.files[0];
if(!file)return;

const fd=new FormData();
fd.append("image",file);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{
method:"POST",
body:fd
});

const data=await res.json();
uploaded[key]=data.data.url;

document.getElementById(key+"Preview").innerHTML=
`<img src="${data.data.url}">`;
};

window.send = async()=>{

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;
const major=document.getElementById("major").value;

if(!name || !email || !phone || !major){
toast("❌ عبي الحقول");
return;
}

if(!uploaded.cert || !uploaded.idimg || !uploaded.personal || !uploaded.payment){
toast("❌ ارفع الصور");
return;
}

await addDoc(collection(db,"students"),{
name,email,phone,major,
cert:uploaded.cert,
idimg:uploaded.idimg,
personal:uploaded.personal,
payment:uploaded.payment,
status:"قيد المراجعة"
});

toast("✅ تم الإرسال");

};

window.scrollToForm=()=>{
document.getElementById("form").scrollIntoView({behavior:"smooth"});
};

</script>

</body>
</html>
