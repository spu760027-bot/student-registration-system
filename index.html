<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPU | التسجيل الإلكتروني</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Tajawal', sans-serif;
  background:#f0f4f8;
  margin:0;
  padding-top:80px;
}

.hero { height:320px; position:relative; }
.hero img { width:100%; height:100%; object-fit:cover; filter:brightness(.6); }

.overlay {
  position:absolute;
  width:100%;height:100%;
  background:rgba(0,0,0,.4);
}

.hero-content {
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:white;text-align:center;
}

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.input {
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
}

.btn {
  background:#1e295a;
  color:white;
  padding:15px;
  border-radius:10px;
  width:100%;
}

.preview img {
  width:80px;height:80px;margin:5px;border-radius:10px;
}

#toast {
position:fixed;
top:20px;right:20px;
background:#1e295a;color:white;
padding:12px;border-radius:10px;
opacity:0;transition:.3s;
}
</style>
</head>

<body>

<div id="toast"></div>

<!-- HERO -->
<div class="hero">
<img src="logo.png">
<div class="overlay"></div>
<div class="hero-content">
<h1 class="text-3xl font-bold">الجامعة السورية الخاصة</h1>
<p>ابدأ مستقبلك معنا 🎓</p>
</div>
</div>

<!-- STATS -->
<div class="max-w-6xl mx-auto mt-10 grid md:grid-cols-3 gap-6 text-center px-4">
<div class="card"><h2 class="text-3xl">2005</h2><p>سنة التأسيس</p></div>
<div class="card"><h2 class="text-3xl">5000+</h2><p>عدد الطلاب</p></div>
<div class="card"><h2 class="text-3xl">6</h2><p>عدد الكليات</p></div>
</div>

<!-- 🔥 الصور (رجعناها) -->
<div class="max-w-6xl mx-auto mt-10 px-4">
<h2 class="text-center text-xl mb-4">📸 الحياة الجامعية</h2>
<div class="grid md:grid-cols-3 gap-4">
<img src="https://images.unsplash.com/photo-1588072432836-e10032774350" class="rounded">
<img src="https://images.unsplash.com/photo-1607237138185-eedd9c632b0b" class="rounded">
<img src="https://images.unsplash.com/photo-1596495577886-d920f1fb7238" class="rounded">
</div>
</div>

<!-- FORM -->
<div class="max-w-2xl mx-auto mt-10 px-4">
<div class="card">

<h2 class="text-center mb-5">استمارة التسجيل</h2>

<input id="name" class="input mb-2" placeholder="الاسم">
<input id="email" class="input mb-2" placeholder="الإيميل">
<input id="phone" class="input mb-2" placeholder="الهاتف">

<select id="major" class="input mb-3">
<option value="">اختر الكلية</option>

<!-- 🔥 كليات SPU -->
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
<option>الهندسة</option>
<option>إدارة الأعمال</option>
<option>العلاقات الدولية والدبلوماسية</option>

</select>

<h3>📁 الوثائق</h3>

<input type="file" onchange="upload(this,'cert')" class="input mb-2">
<div id="certPreview" class="preview"></div>

<input type="file" onchange="upload(this,'idimg')" class="input mb-2">
<div id="idimgPreview" class="preview"></div>

<input type="file" onchange="upload(this,'personal')" class="input mb-2">
<div id="personalPreview" class="preview"></div>

<!-- الدفع -->
<div class="bg-blue-50 p-4 text-center mt-4 rounded">

<p>💳 رسوم 500$</p>

<div style="display:flex;justify-content:center;">
<img src="https://i.ibb.co/JWtdDy1m/qr.png" width="180">
</div>

<input id="transfer" class="input mt-2" placeholder="رقم التحويل">

<input type="file" onchange="upload(this,'payment')" class="input mt-2">
<div id="paymentPreview" class="preview"></div>

</div>

<button class="btn mt-4" onclick="send()">إرسال الطلب</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"student-system-13431.firebaseapp.com",
projectId:"student-system-13431"
});

const db = getFirestore(app);
const API_KEY="bfa4cc0d29fb46535a67fd3dbe8de3bc";

let uploaded={};

function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,3000);
}

/* رفع سريع */
window.upload = async(input,key)=>{
const file=input.files[0];
if(!file)return;

const fd=new FormData();
fd.append("image",file);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{
method:"POST",
body:fd
});

const data=await res.json();
uploaded[key]=data.data.url;

document.getElementById(key+"Preview").innerHTML=
`<img src="${data.data.url}">`;
};

/* 🔥 إرسال فوري */
window.send = async()=>{

const name=nameEl.value.trim();
const email=emailEl.value.trim();
const phone=phoneEl.value.trim();
const major=majorEl.value;
const transfer=transferEl.value.trim();

if(!name || !email || !phone || !major){
toast("❌ عبي الحقول");
return;
}

if(!uploaded.cert || !uploaded.idimg || !uploaded.personal || !uploaded.payment){
toast("❌ ارفع الصور");
return;
}

/* 🔥 ما في انتظار → سريع */
addDoc(collection(db,"students"),{
name,email,phone,major,transfer,
cert:uploaded.cert,
idimg:uploaded.idimg,
personal:uploaded.personal,
payment:uploaded.payment,
status:"قيد المراجعة"
});

toast("✅ تم الإرسال فوراً");

};

</script>

</body>
</html>
