<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التسجيل</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; background:#f1f5f9; }
.input { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; }
.btn { background:#1e293b; color:white; padding:12px; width:100%; border-radius:10px; }
</style>
</head>

<body class="p-5">

<h2 class="text-xl mb-4">استمارة التسجيل</h2>

<form id="form" class="space-y-3">

<input class="input" name="name" placeholder="الاسم الكامل" required>
<input class="input" name="phone" placeholder="رقم الهاتف" required>

<button class="btn">إرسال</button>

</form>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
  storageBucket: "student-system-13431.firebasestorage.app",
  messagingSenderId: "752390660616",
  appId: "1:752390660616:web:72651eb2d96f30b45ee7bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("form");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = form.name.value;
  const phone = form.phone.value;

  try {
    await addDoc(collection(db, "students"), {
      name,
      phone
    });

    msg.innerText = "تم الإرسال ✅";
    form.reset();

  } catch (err) {
    console.error(err);
    msg.innerText = "خطأ ❌";
  }
});
</script>

</body>
</html>
