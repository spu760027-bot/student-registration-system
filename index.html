<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPU Registration</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Tajawal', sans-serif; background:#f0f4f8; }
.color-sp { color:#1e295a; }
.btn { background:#1e295a; color:white; padding:14px; border-radius:12px; width:100%; }
.btn:hover { background:#8e1a1e; }
.input { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; }
</style>
</head>

<body>

<header class="bg-white shadow p-4 flex justify-between">
<h1 class="text-2xl font-bold color-sp">SPU</h1>
<span class="color-sp">الجامعة السورية الخاصة</span>
</header>

<main class="max-w-xl mx-auto p-6">

<div class="bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold mb-6 color-sp text-center">
استمارة التسجيل الإلكتروني
</h2>

<form id="form" class="space-y-4">

<input class="input" name="name" placeholder="الاسم الكامل" required>
<input class="input" name="phone" placeholder="رقم الهاتف" required>

<button class="btn">إرسال الطلب</button>

</form>

<p id="msg" class="text-center mt-4"></p>

</div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
  storageBucket: "student-system-13431.firebasestorage.app",
  messagingSenderId: "752390660616",
  appId: "1:752390660616:web:72651eb2d96f30b45ee7bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("form");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = form.name.value;
  const phone = form.phone.value;

  try {
    await addDoc(collection(db, "students"), { name, phone });
    msg.innerText = "تم الإرسال ✅";
    form.reset();
  } catch (err) {
    msg.innerText = "خطأ ❌";
  }
});
</script>

</body>
</html>
