<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التسجيل الإلكتروني | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Tajawal', sans-serif; background:#f0f4f8; }

.input {
  width:100%;
  padding:10px;
  border:1px solid #cbd5e1;
  border-radius:10px;
}

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.preview-box {
  position:relative;
  display:inline-block;
}

.preview-box img {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}

.remove-btn {
  position:absolute;
  top:-5px;
  left:-5px;
  background:red;
  color:white;
  border-radius:50%;
  width:20px;
  height:20px;
  font-size:12px;
}

.btn {
  background:#1e295a;
  color:white;
  padding:15px;
  border-radius:12px;
  width:100%;
}
</style>
</head>

<body>

<div class="max-w-2xl mx-auto mt-10">
<div class="card">

<h2 class="text-center text-xl font-bold mb-6">
📋 استمارة التسجيل الإلكتروني 2026
</h2>

<input id="name" class="input mb-3" placeholder="الاسم الكامل">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<!-- الصور -->
<h3 class="font-bold mb-3">📁 رفع الوثائق</h3>

<label class="font-bold text-sm">📄 صورة الشهادة الثانوية</label>
<p class="text-xs text-red-500 mb-1">⚠️ صورة واضحة فقط</p>
<input type="file" id="cert" class="input mb-2" onchange="preview(this,'p1','cert')">
<div id="p1"></div>

<label class="font-bold text-sm">🪪 صورة الهوية الشخصية</label>
<p class="text-xs text-red-500 mb-1">⚠️ الوجهين واضحين</p>
<input type="file" id="idimg" class="input mb-2" onchange="preview(this,'p2','idimg')">
<div id="p2"></div>

<label class="font-bold text-sm">👤 صورة شخصية</label>
<p class="text-xs text-red-500 mb-1">⚠️ خلفية واضحة</p>
<input type="file" id="personal" class="input mb-2" onchange="preview(this,'p3','personal')">
<div id="p3"></div>

<!-- QR -->
<div class="bg-blue-50 p-4 mt-4 text-center rounded-xl">
<p>💳 رسوم التسجيل 20$</p>
<img src="https://i.ibb.co/JWtdDy1m/qr.png" style="width:200px;margin:auto;">
<input id="transfer" class="input mt-3" placeholder="رقم عملية التحويل">
</div>

<button class="btn mt-5" onclick="send()">إرسال</button>

<p id="msg" class="text-center mt-3"></p>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const apiKey = "bfa4cc0d29fb46535a67fd3dbe8de3bc";

async function uploadImage(file){
  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
    method:"POST",
    body:formData
  });

  const data = await res.json();
  return data.data.url;
}

// 👀 preview + حذف
window.preview = (input, id, inputId) => {
  const file = input.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  document.getElementById(id).innerHTML = `
    <div class="preview-box">
      <img src="${url}">
      <button class="remove-btn" onclick="removeImage('${id}','${inputId}')">×</button>
    </div>
  `;
};

window.removeImage = (previewId, inputId) => {
  document.getElementById(previewId).innerHTML = "";
  document.getElementById(inputId).value = "";
};

// 🚀 إرسال
window.send = async () => {

  const msg = document.getElementById("msg");

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  const cert = document.getElementById("cert").files[0];
  const idimg = document.getElementById("idimg").files[0];
  const personal = document.getElementById("personal").files[0];

  if (!name || !phone || !cert || !idimg || !personal) {
    msg.innerText = "❌ تأكد من تعبئة كل الحقول";
    return;
  }

  msg.innerText = "⏳ جاري الرفع...";

  const certUrl = await uploadImage(cert);
  const idUrl = await uploadImage(idimg);
  const personalUrl = await uploadImage(personal);

  await addDoc(collection(db, "students"), {
    name,
    phone,
    cert: certUrl,
    id: idUrl,
    personal: personalUrl
  });

  msg.innerText = "✅ تم الإرسال بنجاح 🎉";

};

</script>

</body>
</html>
