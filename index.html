<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التسجيل الإلكتروني | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Tajawal', sans-serif; background:#f0f4f8; }

.input { width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:10px; }

.btn {
  background:#1e295a;
  color:white;
  padding:15px;
  border-radius:12px;
  width:100%;
  transition:0.3s;
}

.btn:disabled { background:gray; }

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.preview img {
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="max-w-2xl mx-auto mt-10">

<div class="card">

<h2 class="text-center text-xl font-bold mb-6">
📋 استمارة التسجيل الإلكتروني 2026
</h2>

<input id="name" class="input mb-3" placeholder="الاسم الكامل">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<select id="major" class="input mb-4">
<option value="">اختر الكلية</option>
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
<option>الهندسة المعلوماتية</option>
<option>الهندسة المدنية</option>
<option>الهندسة المعمارية</option>
<option>إدارة الأعمال</option>
</select>

<!-- صور -->
<h3 class="font-bold mb-2">📁 رفع الملفات</h3>

<input type="file" id="cert" class="input mb-2" onchange="preview(this,'p1')">
<div id="p1" class="preview mb-2"></div>

<input type="file" id="idimg" class="input mb-2" onchange="preview(this,'p2')">
<div id="p2" class="preview mb-2"></div>

<input type="file" id="personal" class="input mb-2" onchange="preview(this,'p3')">
<div id="p3" class="preview mb-3"></div>

<!-- QR -->
<div class="bg-blue-50 p-4 text-center rounded-xl">
<p>💳 رسوم التسجيل 20$</p>
<img src="https://i.ibb.co/JWtdDy1m/qr.png" style="width:200px;margin:auto;">
<input id="transfer" class="input mt-3" placeholder="رقم عملية التحويل">
</div>

<button id="btn" class="btn mt-5" onclick="send()">إرسال</button>

<p id="msg" class="text-center mt-3"></p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const apiKey = "bfa4cc0d29fb46535a67fd3dbe8de3bc";

async function uploadImage(file){
  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
    method:"POST",
    body:formData
  });

  const data = await res.json();
  return data.data.url;
}

window.preview = (input, id) => {
  const file = input.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  document.getElementById(id).innerHTML = `<img src="${url}">`;
};

window.send = async () => {

  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const major = document.getElementById("major").value;

  const cert = document.getElementById("cert").files[0];
  const idimg = document.getElementById("idimg").files[0];
  const personal = document.getElementById("personal").files[0];

  if (!name || !phone || !major || !cert || !idimg || !personal) {
    msg.innerText = "❌ تأكد من تعبئة كل الحقول";
    return;
  }

  btn.disabled = true;
  btn.innerText = "⏳ جاري الإرسال...";

  const certUrl = await uploadImage(cert);
  const idUrl = await uploadImage(idimg);
  const personalUrl = await uploadImage(personal);

  await addDoc(collection(db, "students"), {
    name,
    phone,
    major,
    cert: certUrl,
    id: idUrl,
    personal: personalUrl
  });

  btn.innerText = "✅ تم الإرسال";
  msg.innerText = "تم إرسال الطلب بنجاح 🎉";

};

</script>

</body>
</html>
