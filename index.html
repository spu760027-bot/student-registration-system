<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPU | التسجيل الإلكتروني</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Tajawal', sans-serif;
  background:#f0f4f8;
  margin:0;
  padding-top:80px;
}

.navbar {
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}

.hero {
  height:320px;
  position:relative;
  overflow:hidden;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.6);
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.4);
}

.hero-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
}

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.input {
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
}

.btn {
  background:#1e295a;
  color:white;
  padding:15px;
  border-radius:10px;
  width:100%;
}

.preview img {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:12px;
  margin:5px;
  border:2px solid #ddd;
}

#toast {
  position:fixed;
  top:20px;
  right:20px;
  background:#1e295a;
  color:white;
  padding:12px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body>

<div id="toast"></div>

<!-- NAV -->
<nav class="navbar fixed w-full top-0 z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4 text-white">

<div class="flex items-center gap-2">
<img src="logo.png" class="w-10 h-10 rounded-full border-2 border-white shadow">
<b>SPU</b>
</div>

<button onclick="scrollToForm()" class="bg-red-600 px-4 py-2 rounded">
قدّم الآن
</button>

</div>
</nav>

<!-- HERO -->
<div class="hero">
<img src="https://spu.edu.sy/sites/default/files/2023-10/banner.jpg">
<div class="overlay"></div>

<div class="hero-content">
<h1 class="text-3xl font-bold">ابدأ مستقبلك مع SPU 🎓</h1>
<p>الجامعة السورية الخاصة</p>
</div>
</div>

<!-- STATS -->
<div class="max-w-6xl mx-auto mt-12 px-4 text-center grid md:grid-cols-3 gap-6">

<div class="card">
<h2 class="text-4xl font-bold text-[#1e295a]">2005</h2>
<p>📅 سنة التأسيس</p>
</div>

<div class="card">
<h2 class="text-4xl font-bold text-[#1e295a]">5000+</h2>
<p>👨‍🎓 عدد الطلاب</p>
</div>

<div class="card">
<h2 class="text-4xl font-bold text-[#1e295a]">6</h2>
<p>🎓 عدد الكليات</p>
</div>

</div>

<!-- FORM -->
<div id="form" class="max-w-2xl mx-auto mt-10 px-4">
<div class="card">

<h2 class="text-xl text-center mb-6">استمارة التسجيل</h2>

<input id="name" class="input mb-3" placeholder="الاسم الثلاثي">
<input id="email" class="input mb-3" placeholder="البريد الإلكتروني">
<input id="national" class="input mb-3" placeholder="الرقم الوطني">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<select id="major" class="input mb-5">
<option value="">اختر الكلية</option>

<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
<option>التمريض</option>
<option>الهندسة المدنية</option>
<option>الهندسة المعمارية</option>
<option>هندسة المعلوماتية والاتصالات</option>
<option>هندسة الذكاء الاصطناعي</option>
<option>الهندسة الميكانيكية</option>
<option>الهندسة الكهربائية</option>
<option>هندسة البترول</option>
<option>إدارة الأعمال</option>
<option>المحاسبة</option>
<option>التسويق</option>
<option>الاقتصاد</option>
<option>الإعلام</option>
<option>الحقوق</option>
<option>التربية</option>
<option>اللغات والترجمة</option>
<option>العلاقات الدولية</option>

</select>

<!-- DOCUMENTS -->
<h3 class="mb-3 font-bold">📁 الوثائق</h3>

<label>📄 صورة الشهادة الثانوية</label>
<input type="file" onchange="upload(this,'cert')" class="input mb-2">
<div id="certPreview" class="preview"></div>

<label>🪪 صورة الهوية</label>
<input type="file" onchange="upload(this,'idimg')" class="input mb-2">
<div id="idimgPreview" class="preview"></div>

<label>👤 صورة شخصية</label>
<input type="file" onchange="upload(this,'personal')" class="input mb-2">
<div id="personalPreview" class="preview"></div>

<!-- PAYMENT -->
<div class="bg-blue-50 p-4 text-center mt-4 rounded-xl">

<p class="font-bold mb-2">💳 رسوم التسجيل 500$</p>

<div class="flex justify-center">
<img src="https://i.ibb.co/JWtdDy1m/qr.png" style="width:180px">
</div>

<label class="block mt-3 font-bold">📸 صورة إثبات الدفع</label>
<input type="file" onchange="upload(this,'payment')" class="input mt-2">
<div id="paymentPreview" class="preview"></div>

<input id="transfer" class="input mt-3" placeholder="رقم التحويل">

</div>

<button id="submitBtn" class="btn mt-5" onclick="send()">إرسال الطلب</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID"
});

const db = getFirestore(app);

const API_KEY = "YOUR_IMGBB_KEY";

let uploaded = {};
let sending = false;

/* TOAST */
function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,3000);
}

/* UPLOAD */
window.upload = async(input,key)=>{
const file=input.files[0];
if(!file) return;

uploaded[key]=null;
document.getElementById(key+"Preview").innerHTML="⏳ رفع...";

try{
const fd=new FormData();
fd.append("image",file);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{
method:"POST",
body:fd
});

const data=await res.json();

if(!data.success){
toast("❌ فشل رفع الصورة");
uploaded[key]=null;
return;
}

uploaded[key]=data.data.url;

document.getElementById(key+"Preview").innerHTML=
`<img src="${data.data.url}">`;

}catch(e){
console.log(e);
toast("❌ خطأ في الرفع");
uploaded[key]=null;
}
};

/* SEND */
window.send = async()=>{

if(sending) return;
sending=true;

const btn=document.getElementById("submitBtn");
btn.disabled=true;
btn.innerText="جاري الإرسال...";

try{

const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const national=document.getElementById("national").value.trim();
const phone=document.getElementById("phone").value.trim();
const major=document.getElementById("major").value;
const transfer=document.getElementById("transfer").value.trim();

if(!name || !email || !national || !phone || !major){
toast("❌ عبي كل الحقول");
throw new Error();
}

if(!email.includes("@")){
toast("❌ البريد غير صالح");
throw new Error();
}

if(phone.length < 8){
toast("❌ رقم الهاتف غير صالح");
throw new Error();
}

if(!transfer){
toast("❌ أدخل رقم التحويل");
throw new Error();
}

if(!uploaded.cert || !uploaded.idimg || !uploaded.personal || !uploaded.payment){
toast("❌ ارفع كل الوثائق");
throw new Error();
}

toast("⏳ جاري الإرسال...");

await addDoc(collection(db,"students"),{
name,
email,
national,
phone,
major,
transfer,
cert:uploaded.cert,
idimg:uploaded.idimg,
personal:uploaded.personal,
payment:uploaded.payment,
status:"قيد المراجعة",
date:serverTimestamp()
});

toast("✅ تم الإرسال بنجاح");

setTimeout(()=>location.reload(),1200);

}catch(e){
console.log(e);
toast("❌ فشل الإرسال");
}finally{
sending=false;
btn.disabled=false;
btn.innerText="إرسال الطلب";
}
};

window.scrollToForm=()=>{
document.getElementById("form").scrollIntoView({behavior:"smooth"});
};

</script>

</body>
</html>
