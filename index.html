<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل طالب</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; }

.card {
  max-width:450px;
  margin:40px auto;
  background:#1e293b;
  padding:20px;
  border-radius:16px;
}

.input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

.btn {
  background:#22c55e;
  width:100%;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}

.label { font-size:14px; margin-bottom:5px; display:block; }
</style>
</head>

<body>

<div class="card">

<h2 class="text-center text-xl mb-4">📋 تسجيل طالب</h2>

<input id="name" class="input" placeholder="الاسم الكامل">
<input id="phone" class="input" placeholder="رقم الهاتف">

<label class="label">📄 صورة الشهادة الثانوية</label>
<input type="file" id="cert" class="input">

<label class="label">🪪 صورة الهوية</label>
<input type="file" id="idimg" class="input">

<label class="label">👤 صورة شخصية</label>
<input type="file" id="personal" class="input">

<!-- QR -->
<div style="text-align:center;margin:15px 0;">
  <p style="margin-bottom:10px;">💳 قم بالدفع عبر هذا الكود</p>

  <img 
    src="https://i.ibb.co/JWtdDy1m/qr.png"
    style="width:200px;border-radius:12px;margin:auto;"
  >

  <p style="margin-top:10px;color:#94a3b8;font-size:13px;">
    بعد الدفع قم برفع الصور وإرسال الطلب
  </p>

  <p style="color:yellow;font-size:12px;">
    ⚠️ تأكد من الدفع قبل الإرسال
  </p>
</div>

<button class="btn" onclick="send()">إرسال</button>

<p id="msg" style="text-align:center;margin-top:10px;"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const apiKey = "bfa4cc0d29fb46535a67fd3dbe8de3bc";

async function uploadImage(file){
  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  return data.data.url;
}

window.send = async () => {

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  const cert = document.getElementById("cert").files[0];
  const idimg = document.getElementById("idimg").files[0];
  const personal = document.getElementById("personal").files[0];

  if (!name || !phone || !cert || !idimg || !personal) {
    alert("املأ كل الحقول");
    return;
  }

  document.getElementById("msg").innerText = "جاري الرفع... ⏳";

  const certUrl = await uploadImage(cert);
  const idUrl = await uploadImage(idimg);
  const personalUrl = await uploadImage(personal);

  await addDoc(collection(db, "students"), {
    name,
    phone,
    cert: certUrl,
    id: idUrl,
    personal: personalUrl
  });

  document.getElementById("msg").innerText = "تم الإرسال بنجاح ✅";

};

</script>

</body>
</html>
