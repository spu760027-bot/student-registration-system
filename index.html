<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التسجيل | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Tajawal', sans-serif; background:#f0f4f8; margin:0; }

.navbar {
  background:white;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  position:sticky;
  top:0;
  z-index:999;
}

.hero { height:300px; position:relative; overflow:hidden; }
.hero img { width:100%; height:100%; object-fit:cover; filter:brightness(.7); }

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.4);
}

.hero-content {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

.card {
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.input {
width:100%;
padding:12px;
border:1px solid #cbd5e1;
border-radius:10px;
}

.btn {
background:#1e295a;
color:white;
padding:15px;
border-radius:10px;
width:100%;
}

.preview img {
width:90px;
height:90px;
border-radius:10px;
}

#toast {
position:fixed;
top:20px;
right:20px;
background:#1e295a;
color:white;
padding:12px;
border-radius:10px;
opacity:0;
transition:.3s;
}
</style>
</head>

<body>

<div id="toast"></div>

<!-- NAVBAR -->
<div class="navbar flex justify-between items-center px-6 py-3">
  <h2 class="font-bold text-[#1e295a]">🎓 SPU</h2>
  <div class="flex gap-4">
    <a href="#">الرئيسية</a>
    <a href="#form">التسجيل</a>
    <a href="track.html">تتبع الطلب</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
<img src="logo.png">
<div class="overlay"></div>

<div class="hero-content">
<h1 class="text-3xl font-bold">ابدأ مستقبلك مع SPU 🎓</h1>
<p class="mt-2">جامعة رائدة بمستوى عالمي</p>
<button onclick="scrollToForm()" class="mt-4 bg-red-700 px-6 py-2 rounded-lg">
قدّم الآن
</button>
</div>
</div>

<!-- ABOUT -->
<div class="max-w-6xl mx-auto mt-10 px-4 text-center">
<h2 class="text-2xl font-bold text-[#1e295a] mb-4">عن الجامعة</h2>
<p class="text-gray-600">
تأسست الجامعة السورية الخاصة عام 2005 وتقدم برامج تعليمية متميزة.
</p>

<div class="grid grid-cols-3 gap-4 mt-6">
<div class="bg-white p-4 rounded shadow">📅 2005</div>
<div class="bg-white p-4 rounded shadow">👨‍🎓 3000+</div>
<div class="bg-white p-4 rounded shadow">🎓 6 كليات</div>
</div>
</div>

<!-- FORM -->
<div id="form" class="max-w-2xl mx-auto mt-10 px-4">
<div class="card">

<h2 class="text-xl font-bold text-center mb-6">استمارة التسجيل</h2>

<input id="name" class="input mb-3" placeholder="الاسم الثلاثي">
<input id="email" class="input mb-3" placeholder="البريد الإلكتروني">
<input id="national" class="input mb-3" placeholder="الرقم الوطني">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<select id="major" class="input mb-5">
<option value="">اختر الكلية المطلوبة</option>

<optgroup label="الكليات الطبية">
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
</optgroup>

<optgroup label="الكليات الهندسية">
<option>هندسة المعلوماتية والاتصالات</option>
<option>هندسة الذكاء الاصطناعي</option>
<option>الهندسة المدنية</option>
<option>الهندسة المعمارية</option>
<option>هندسة البترول</option>
</optgroup>

<optgroup label="الكليات الإدارية">
<option>إدارة الأعمال</option>
</optgroup>
</select>

<h3 class="font-bold mb-3">📁 الوثائق</h3>

<label>📄 صورة الشهادة الثانوية</label>
<input type="file" onchange="upload(this,'cert')" class="input mb-2">
<div id="certPreview" class="preview mb-3"></div>

<label>🪪 صورة الهوية</label>
<input type="file" onchange="upload(this,'idimg')" class="input mb-2">
<div id="idimgPreview" class="preview mb-3"></div>

<label>👤 صورة شخصية</label>
<input type="file" onchange="upload(this,'personal')" class="input mb-2">
<div id="personalPreview" class="preview mb-4"></div>

<div class="bg-blue-50 p-4 rounded-xl text-center">
<p class="font-bold mb-2">💳 رسوم التسجيل 500$</p>
<img src="https://i.ibb.co/JWtdDy1m/qr.png" style="width:180px;margin:auto">
<input id="transfer" class="input mt-3" placeholder="رقم عملية التحويل">
</div>

<button class="btn mt-5" onclick="send()">إرسال الطلب</button>

</div>
</div>

<!-- FOOTER -->
<div class="mt-10 bg-[#1e295a] text-white text-center p-5">
<p>© 2026 SPU University</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
authDomain:"student-system-13431.firebaseapp.com",
projectId:"student-system-13431"
});

const db = getFirestore(app);
const API_KEY="bfa4cc0d29fb46535a67fd3dbe8de3bc";

let uploaded={};

function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,3000);
}

window.upload = async(input,key)=>{
const file=input.files[0];
if(!file)return;

document.getElementById(key+"Preview").innerHTML =
`<img src="${URL.createObjectURL(file)}">`;

const fd=new FormData();
fd.append("image",file);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{
method:"POST",
body:fd
});

const data=await res.json();
if(data.success){
uploaded[key]=data.data.url;
}
};

window.send = async()=>{

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const phone = document.getElementById("phone").value;
const major = document.getElementById("major").value;

if(!name || !email || !phone || !major){
toast("❌ عبي كل الحقول");
return;
}

if(!uploaded.cert || !uploaded.idimg || !uploaded.personal){
toast("❌ ارفع كل الصور");
return;
}

await addDoc(collection(db,"students"),{
name,email,phone,major,
cert:uploaded.cert,
id:uploaded.idimg,
personal:uploaded.personal,
status:"قيد المراجعة"
});

toast("✅ تم الإرسال");
setTimeout(()=>window.location.href="success.html",1200);
};

window.scrollToForm=()=>{
document.getElementById("form").scrollIntoView({behavior:"smooth"});
};

</script>

</body>
</html>
