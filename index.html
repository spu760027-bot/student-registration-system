<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل طالب</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family:sans-serif; background:#f1f5f9; }
.box { max-width:400px; margin:50px auto; background:white; padding:20px; border-radius:12px; }
.input { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; margin-bottom:10px; }
.btn { background:#1e293b; color:white; padding:10px; width:100%; border-radius:8px; }
</style>
</head>

<body>

<div class="box">

<h2 class="text-center mb-4">📋 تسجيل طالب</h2>

<input id="name" class="input" placeholder="الاسم">
<input id="phone" class="input" placeholder="الهاتف">
<input id="image" type="file" class="input">

<button class="btn" onclick="send()">إرسال</button>

<p id="msg" class="text-center mt-3"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
  storageBucket: "student-system-13431.firebasestorage.app",
  messagingSenderId: "752390660616",
  appId: "1:752390660616:web:72651eb2d96f30b45ee7bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.send = async () => {

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const file = document.getElementById("image").files[0];

  if (!name || !phone) {
    alert("املأ البيانات");
    return;
  }

  if (!file) {
    alert("اختر صورة");
    return;
  }

  document.getElementById("msg").innerText = "جاري الرفع... ⏳";

  const apiKey = "bfa4cc0d29fb46535a67fd3dbe8de3bc";

  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  const imageUrl = data.data.url;

  await addDoc(collection(db, "students"), {
    name,
    phone,
    image: imageUrl
  });

  document.getElementById("msg").innerText = "تم الإرسال ✅";

};

</script>

</body>
</html>
