<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التسجيل الإلكتروني | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Tajawal', sans-serif; background:#f0f4f8; margin:0; }

.hero { width:100%; height:260px; position:relative; overflow:hidden; }
.hero img { width:100%; height:100%; object-fit:cover; filter:brightness(.8); }
.overlay { position:absolute; width:100%; height:100%; background:rgba(0,0,0,.2); }

.hero-content {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

.card {
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.input {
width:100%;
padding:12px;
border:1px solid #cbd5e1;
border-radius:10px;
}

.btn {
background:#1e295a;
color:white;
padding:15px;
border-radius:10px;
width:100%;
}

.btn:hover { background:#8e1a1e; }

.preview img {
width:90px;
height:90px;
border-radius:10px;
}

#toast {
position:fixed;
top:20px;
right:20px;
background:#1e295a;
color:white;
padding:12px;
border-radius:10px;
opacity:0;
transition:.3s;
}

.progress { height:6px; background:#e2e8f0; border-radius:10px; overflow:hidden; }
.progress-bar { height:100%; width:0%; background:#1e295a; }
</style>
</head>

<body>

<div id="toast"></div>

<!-- HERO -->
<div class="hero">
<img src="logo.png">
<div class="overlay"></div>

<div class="hero-content">
<h1>ابدأ مستقبلك مع SPU 🎓</h1>
<p>انضم وسجل الآن بسهولة</p>
<button onclick="scrollToForm()" style="background:#8e1a1e;padding:12px 25px;border-radius:10px;">قدّم الآن</button>
</div>
</div>

<!-- INFO -->
<div class="max-w-6xl mx-auto mt-10 px-4">
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">

<div class="bg-white p-6 rounded-2xl shadow">
<h2 class="text-3xl font-bold text-[#1e295a]">2005</h2>
<p>📅 سنة التأسيس</p>
</div>

<div class="bg-white p-6 rounded-2xl shadow">
<h2 class="text-3xl font-bold text-[#1e295a]">3000+</h2>
<p>👨‍🎓 عدد الطلاب</p>
</div>

<div class="bg-white p-6 rounded-2xl shadow">
<h2 class="text-3xl font-bold text-[#1e295a]">6</h2>
<p>🎓 عدد الكليات</p>
</div>

</div>
</div>

<!-- FORM -->
<div class="max-w-2xl mx-auto mt-10 px-4">
<div class="card">

<h2 class="text-xl font-bold text-center mb-6">استمارة التسجيل الإلكتروني - 2026</h2>

<input id="name" class="input mb-3" placeholder="الاسم الثلاثي">
<input id="email" class="input mb-3" placeholder="البريد الإلكتروني">
<input id="national" class="input mb-3" placeholder="الرقم الوطني">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<select id="major" class="input mb-5">
<option value="">اختر الكلية المطلوبة</option>

<optgroup label="الكليات الطبية">
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
</optgroup>

<optgroup label="الكليات الهندسية">
<option>هندسة المعلوماتية والاتصالات</option>
<option>هندسة الذكاء الاصطناعي</option>
<option>الهندسة المدنية</option>
<option>الهندسة المعمارية</option>
<option>هندسة البترول</option>
</optgroup>

<optgroup label="الكليات الإدارية">
<option>إدارة الأعمال</option>
</optgroup>

</select>

<h3 class="font-bold mb-3">📁 الوثائق</h3>

<label>📄 صورة الشهادة الثانوية</label>
<input type="file" onchange="upload(this,'cert')" class="input mb-2">
<div id="certPreview" class="preview mb-3"></div>

<label>🪪 صورة الهوية</label>
<input type="file" onchange="upload(this,'idimg')" class="input mb-2">
<div id="idimgPreview" class="preview mb-3"></div>

<label>👤 صورة شخصية</label>
<input type="file" onchange="upload(this,'personal')" class="input mb-2">
<div id="personalPreview" class="preview mb-4"></div>

<div class="bg-blue-50 p-4 rounded-xl text-center">
<p class="font-bold mb-2">💳 رسوم التسجيل 500$</p>
<img src="https://i.ibb.co/JWtdDy1m/qr.png" style="width:180px;margin:auto">
<input id="transfer" class="input mt-3" placeholder="رقم عملية التحويل">
</div>

<button class="btn mt-5" onclick="send()">إرسال الطلب</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
authDomain:"student-system-13431.firebaseapp.com",
projectId:"student-system-13431"
});

const db = getFirestore(app);

const API_KEY="bfa4cc0d29fb46535a67fd3dbe8de3bc";

let uploaded={};

function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,3000);
}

window.upload = async(input,key)=>{
try{
const file=input.files[0];
if(!file)return;

document.getElementById(key+"Preview").innerHTML=
`<img src="${URL.createObjectURL(file)}">`;

const fd=new FormData();
fd.append("image",file);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{
method:"POST",
body:fd
});

const data=await res.json();

if(!data.success) throw "error";

uploaded[key]=data.data.url;

}catch{
toast("❌ فشل رفع الصورة");
}
};

window.send = async()=>{
try{

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;
const major=document.getElementById("major").value;

if(!name || !email || !phone || !major){
toast("❌ يرجى تعبئة جميع الحقول");
return;
}

if(!uploaded.cert || !uploaded.idimg || !uploaded.personal){
toast("❌ ارفع كل الصور");
return;
}

await addDoc(collection(db,"students"),{
name,email,phone,major,
cert:uploaded.cert,
id:uploaded.idimg,
personal:uploaded.personal,
status:"قيد المراجعة"
});

toast("✅ تم الإرسال");

setTimeout(()=>window.location.href="success.html",1200);

}catch(e){
console.log(e);
toast("❌ خطأ في الإرسال");
}
};

window.scrollToForm = ()=>{
document.querySelector(".card").scrollIntoView({behavior:"smooth"});
};

</script>

</body>
</html>
