<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
  storageBucket: "student-system-13431.firebasestorage.app",
  messagingSenderId: "752390660616",
  appId: "1:752390660616:web:72651eb2d96f30b45ee7bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// ===== كود الفورم =====
const form = document.getElementById("form");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = form.name.value;
  const phone = form.phone.value;
  const file = form.file1.files[0];

  try {
    const fileRef = ref(storage, "files/" + file.name);
    await uploadBytes(fileRef, file);
    const url = await getDownloadURL(fileRef);

    await addDoc(collection(db, "students"), {
      name,
      phone,
      file: url
    });

    msg.innerText = "تم الإرسال ✅";

  } catch (err) {
    console.error(err);
    msg.innerText = "خطأ ❌";
  }
});
</script>
