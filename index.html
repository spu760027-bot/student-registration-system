<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التسجيل الإلكتروني | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Tajawal', sans-serif; background:#f0f4f8; }

.color-sp { color:#1e295a; }
.color-u { color:#8e1a1e; }

.input {
  width:100%;
  padding:10px;
  border:1px solid #cbd5e1;
  border-radius:10px;
}

.btn {
  background:#1e295a;
  color:white;
  padding:15px;
  border-radius:12px;
  width:100%;
}

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header class="bg-white border-b-4 border-[#1e295a] p-5">
  <h1 class="text-3xl font-bold">
    <span class="color-sp">SP</span><span class="color-u">U</span>
  </h1>
</header>

<div class="max-w-2xl mx-auto mt-10">

<div class="card">

<h2 class="text-center text-xl font-bold color-sp mb-6">
استمارة التسجيل الإلكتروني 2026
</h2>

<input id="name" class="input mb-3" placeholder="الاسم الكامل">
<input id="national" class="input mb-3" placeholder="الرقم الوطني">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<!-- 🎯 اختيار الكلية الاحترافي -->
<select id="major" class="input mb-4" required>
  <option value="" disabled selected>اختر الكلية المطلوبة</option>

  <optgroup label="الكليات الطبية">
    <option>الطب البشري</option>
    <option>طب الأسنان</option>
    <option>الصيدلة</option>
  </optgroup>

  <optgroup label="الكليات الهندسية">
    <option>هندسة المعلوماتية والاتصالات</option>
    <option>هندسة الذكاء الاصطناعي</option>
    <option>الهندسة المدنية</option>
    <option>الهندسة المعمارية</option>
    <option>هندسة البترول</option>
  </optgroup>

  <optgroup label="الكليات الإدارية">
    <option>إدارة الأعمال</option>
  </optgroup>
</select>

<!-- 📁 رفع الملفات -->
<h3 class="font-bold mb-2">📁 رفع الملفات</h3>

<input type="file" id="cert" class="input mb-2">
<input type="file" id="idimg" class="input mb-2">
<input type="file" id="personal" class="input mb-4">

<!-- 💳 الدفع -->
<div class="bg-blue-50 p-4 rounded-xl text-center">

<p class="mb-2 font-bold">💳 رسوم التسجيل 20$</p>

<img src="https://i.ibb.co/JWtdDy1m/qr.png" style="width:200px;margin:auto;border-radius:10px;">

<p class="text-sm mt-2">امسح الكود للدفع</p>

<input id="transfer" class="input mt-3" placeholder="رقم عملية التحويل">

</div>

<button class="btn mt-5" onclick="send()">إرسال</button>

<p id="msg" class="text-center mt-3"></p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const apiKey = "bfa4cc0d29fb46535a67fd3dbe8de3bc";

async function uploadImage(file){
  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
    method:"POST",
    body:formData
  });

  const data = await res.json();
  return data.data.url;
}

window.send = async () => {

  const name = document.getElementById("name").value;
  const national = document.getElementById("national").value;
  const phone = document.getElementById("phone").value;
  const major = document.getElementById("major").value;
  const transfer = document.getElementById("transfer").value;

  const cert = document.getElementById("cert").files[0];
  const idimg = document.getElementById("idimg").files[0];
  const personal = document.getElementById("personal").files[0];

  if (!name || !phone || !cert || !idimg || !personal || !major) {
    alert("املأ كل الحقول");
    return;
  }

  document.getElementById("msg").innerText = "جاري الرفع... ⏳";

  const certUrl = await uploadImage(cert);
  const idUrl = await uploadImage(idimg);
  const personalUrl = await uploadImage(personal);

  await addDoc(collection(db, "students"), {
    name,
    national,
    phone,
    major,
    transfer,
    cert: certUrl,
    id: idUrl,
    personal: personalUrl
  });

  document.getElementById("msg").innerText = "تم الإرسال بنجاح ✅";

};

</script>

</body>
</html>
