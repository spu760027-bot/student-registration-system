<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPU Premium</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Tajawal', sans-serif;
  margin:0;
  background: linear-gradient(135deg, #1e295a, #8e1a1e);
  min-height:100vh;
  color:white;
}

/* Glow */
body::before {
  content:'';
  position:fixed;
  width:500px;
  height:500px;
  background:#ffffff20;
  filter:blur(120px);
  top:-100px;
  right:-100px;
}

/* Hero */
.hero {
  height:200px;
  overflow:hidden;
}
.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.7;
}

/* Card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* Inputs */
.input {
  width:100%;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
}
.input::placeholder { color:#ddd; }

.input:focus {
  outline:none;
  border-color:#fff;
  box-shadow:0 0 10px #ffffff50;
}

/* Button */
.btn {
  width:100%;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(135deg,#ffffff,#dbeafe);
  color:#1e295a;
  font-weight:bold;
  transition:0.3s;
}
.btn:hover {
  transform:scale(1.05);
  box-shadow:0 10px 30px rgba(255,255,255,0.3);
}

/* Preview */
.preview img {
  width:80px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
  <img src="logo.png">
</div>

<div class="max-w-2xl mx-auto mt-[-60px] px-4">

<div class="card">

<h2 class="text-2xl font-bold text-center mb-6">
🚀 تسجيل طالب - SPU Premium
</h2>

<input id="name" class="input mb-3" placeholder="الاسم الكامل">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<select id="major" class="input mb-5">
<option value="">اختر الكلية</option>
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
<option>هندسة المعلوماتية والاتصالات</option>
<option>الهندسة المدنية</option>
<option>إدارة الأعمال</option>
</select>

<h3 class="mb-3">📁 رفع الملفات</h3>

<label>📄 شهادة</label>
<input type="file" id="cert" class="input mb-2" onchange="preview(this,'p1')">
<div id="p1" class="preview mb-3"></div>

<label>🪪 هوية</label>
<input type="file" id="idimg" class="input mb-2" onchange="preview(this,'p2')">
<div id="p2" class="preview mb-3"></div>

<label>👤 شخصية</label>
<input type="file" id="personal" class="input mb-2" onchange="preview(this,'p3')">
<div id="p3" class="preview mb-4"></div>

<div class="bg-white/10 p-4 rounded-xl text-center">
<p>💳 الدفع عبر QR</p>
<img src="https://i.ibb.co/JWtdDy1m/qr.png" class="mx-auto my-3" style="width:150px">
<input id="transfer" class="input" placeholder="رقم العملية">
</div>

<button class="btn mt-5" onclick="send()">إرسال 🚀</button>

<p id="msg" class="text-center mt-3 font-bold"></p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const apiKey = "bfa4cc0d29fb46535a67fd3dbe8de3bc";

/* Upload */
async function uploadImage(file){
  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
    method:"POST",
    body:formData
  });

  const data = await res.json();
  return data.data.url;
}

/* Preview */
window.preview = (input, id)=>{
  const file = input.files[0];
  if (!file) return;
  document.getElementById(id).innerHTML =
    `<img src="${URL.createObjectURL(file)}">`;
};

/* Send */
window.send = async () => {

  const msg = document.getElementById("msg");

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const major = document.getElementById("major").value;

  const cert = document.getElementById("cert").files[0];
  const idimg = document.getElementById("idimg").files[0];
  const personal = document.getElementById("personal").files[0];

  if (!name || !phone || !major || !cert || !idimg || !personal) {
    msg.innerText = "❌ يرجى تعبئة كل الحقول";
    return;
  }

  msg.innerText = "⏳ جاري رفع الصور...";

  const certUrl = await uploadImage(cert);
  const idUrl = await uploadImage(idimg);
  const personalUrl = await uploadImage(personal);

  msg.innerText = "⏳ جاري حفظ البيانات...";

  const docRef = await addDoc(collection(db, "students"), {
    name,
    phone,
    major,
    cert: certUrl,
    id: idUrl,
    personal: personalUrl,
    status: "⏳ قيد المراجعة"
  });

  const requestId = docRef.id;

  localStorage.setItem("requestId", requestId);

  msg.innerText = "✅ تم الإرسال - رقم طلبك: " + requestId;

  setTimeout(()=>{
    window.location.href = "track.html";
  },1500);
};

</script>

</body>
</html>
