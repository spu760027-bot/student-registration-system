<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPU | التسجيل الإلكتروني</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Tajawal', sans-serif;
  background:#f0f4f8;
  margin:0;
  padding-top:80px;
}

.navbar {
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}

/* HERO */
.hero {
  height:320px;
  background:linear-gradient(to right,#1e295a,#0f172a);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
}

.hero img {
  width:120px;
  height:120px;
  background:white;
  padding:10px;
  border-radius:20px;
  margin-bottom:10px;
}

/* CARD */
.card {
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.input {
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
}

.btn {
  background:#1e295a;
  color:white;
  padding:15px;
  border-radius:10px;
  width:100%;
}

.preview img {
  width:90px;
  height:90px;
  border-radius:10px;
  margin:5px;
}

#toast {
position:fixed;
top:20px;
right:20px;
background:#1e295a;
color:white;
padding:12px;
border-radius:10px;
opacity:0;
transition:.3s;
}
</style>
</head>

<body>

<div id="toast"></div>

<!-- NAVBAR -->
<nav class="navbar fixed w-full top-0 z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4 text-white">
<b>SPU</b>
<button onclick="scrollToForm()" class="bg-red-600 px-4 py-2 rounded">قدّم الآن</button>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<img src="logo.png" onerror="this.src='https://i.ibb.co/4pDNDk1/avatar.png'">
<h1 class="text-3xl font-bold">ابدأ مستقبلك مع SPU 🎓</h1>
<p>الجامعة السورية الخاصة</p>
</div>

<!-- STATS -->
<div class="max-w-6xl mx-auto mt-10 grid md:grid-cols-3 gap-6 text-center px-4">

<div class="card">
<h2 class="text-3xl font-bold">2005</h2>
<p>📅 سنة التأسيس</p>
</div>

<div class="card">
<h2 class="text-3xl font-bold">5000+</h2>
<p>👨‍🎓 عدد الطلاب</p>
</div>

<div class="card">
<h2 class="text-3xl font-bold">6</h2>
<p>🎓 عدد الكليات</p>
</div>

</div>

<!-- GALLERY -->
<div class="max-w-6xl mx-auto mt-10 px-4">
<h2 class="text-center text-xl mb-4">📸 الحياة الجامعية</h2>
<div class="grid md:grid-cols-3 gap-4">
<img src="https://images.unsplash.com/photo-1588072432836-e10032774350" class="rounded">
<img src="https://images.unsplash.com/photo-1607237138185-eedd9c632b0b" class="rounded">
<img src="https://images.unsplash.com/photo-1596495577886-d920f1fb7238" class="rounded">
</div>
</div>

<!-- FORM -->
<div id="form" class="max-w-2xl mx-auto mt-10 px-4">
<div class="card">

<h2 class="text-xl text-center mb-6">استمارة التسجيل</h2>

<input id="name" class="input mb-3" placeholder="الاسم الثلاثي">
<input id="email" class="input mb-3" placeholder="البريد الإلكتروني">
<input id="national" class="input mb-3" placeholder="الرقم الوطني">
<input id="phone" class="input mb-3" placeholder="رقم الهاتف">

<select id="major" class="input mb-5">
<option value="">اختر الكلية</option>
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
<option>التمريض</option>
<option>الهندسة المعلوماتية</option>
<option>الهندسة المدنية</option>
<option>الهندسة المعمارية</option>
<option>إدارة الأعمال</option>
<option>العلاقات الدولية</option>
</select>

<h3 class="mb-3 font-bold">📁 الوثائق</h3>

<label>📄 صورة الشهادة الثانوية</label>
<input type="file" onchange="upload(this,'cert')" class="input mb-2">
<div id="certPreview" class="preview"></div>

<label>🪪 صورة الهوية</label>
<input type="file" onchange="upload(this,'idimg')" class="input mb-2">
<div id="idimgPreview" class="preview"></div>

<label>👤 صورة شخصية</label>
<input type="file" onchange="upload(this,'personal')" class="input mb-2">
<div id="personalPreview" class="preview"></div>

<div class="bg-blue-50 p-4 text-center mt-4 rounded">

<p>💳 رسوم التسجيل 500$</p>

<div style="display:flex;justify-content:center;">
<img src="https://i.ibb.co/JWtdDy1m/qr.png" width="180">
</div>

<label class="mt-3">📸 إثبات الدفع</label>
<input type="file" onchange="upload(this,'payment')" class="input mt-2">
<div id="paymentPreview" class="preview"></div>

<input id="transfer" class="input mt-2" placeholder="رقم التحويل">

</div>

<button id="submitBtn" class="btn mt-4" onclick="send()">إرسال الطلب</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"PUT_YOUR_API_KEY",
authDomain:"PUT_YOUR_AUTH_DOMAIN",
projectId:"PUT_YOUR_PROJECT_ID"
});

const db = getFirestore(app);
const API_KEY="PUT_YOUR_IMGBB_KEY";

let uploaded={};
let sending=false;

function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,3000);
}

window.upload = async(input,key)=>{
const file=input.files[0];
if(!file)return;

const fd=new FormData();
fd.append("image",file);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{
method:"POST",
body:fd
});

const data=await res.json();
uploaded[key]=data.data.url;

document.getElementById(key+"Preview").innerHTML=
`<img src="${data.data.url}">`;
};

window.send = async()=>{
if(sending)return;
sending=true;

const btn=document.getElementById("submitBtn");
btn.disabled=true;

try{
const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim();
const national=document.getElementById("national").value.trim();
const phone=document.getElementById("phone").value.trim();
const major=document.getElementById("major").value;
const transfer=document.getElementById("transfer").value.trim();

if(!name || !email || !national || !phone || !major){
toast("❌ عبي كل الحقول");
throw new Error();
}

if(!uploaded.cert || !uploaded.idimg || !uploaded.personal || !uploaded.payment){
toast("❌ ارفع كل الوثائق");
throw new Error();
}

await addDoc(collection(db,"students"),{
name,email,national,phone,major,transfer,
cert:uploaded.cert,
idimg:uploaded.idimg,
personal:uploaded.personal,
payment:uploaded.payment,
status:"قيد المراجعة",
date:serverTimestamp()
});

toast("✅ تم الإرسال");
setTimeout(()=>location.reload(),1000);

}catch(e){
toast("❌ فشل الإرسال");
}

sending=false;
btn.disabled=false;
};

window.scrollToForm=()=>{
document.getElementById("form").scrollIntoView({behavior:"smooth"});
};

</script>

</body>
</html>
