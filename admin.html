<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; }

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:16px;
  margin-bottom:15px;
}

.images {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
  margin-top:10px;
}

.images img {
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}

.btn-delete {
  background:#ef4444;
  padding:6px 10px;
  border-radius:6px;
  margin-top:10px;
}

.logout {
  background:#334155;
  padding:8px 12px;
  border-radius:8px;
}

.search {
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body class="p-5">

<div class="header">
  <div>
    <h2 class="text-xl font-bold">📊 لوحة التحكم</h2>
    <p id="count" style="color:gray;">عدد الطلبات: 0</p>
  </div>
  <button class="logout" onclick="logout()">تسجيل خروج</button>
</div>

<input id="search" class="search" placeholder="🔍 بحث بالاسم">

<div id="data"></div>

<script type="module">

// 🔐 حماية
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "login.html";
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("data");
const searchInput = document.getElementById("search");
const countEl = document.getElementById("count");

let allData = [];

async function loadData() {
  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "students"));

  countEl.innerText = "عدد الطلبات: " + querySnapshot.size;

  if (querySnapshot.empty) {
    container.innerHTML = "<p style='text-align:center'>لا يوجد طلبات 📭</p>";
    return;
  }

  const docs = [];
  querySnapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));

  allData = docs.reverse();
  renderData(allData);
}

function renderData(data) {
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = "<p style='text-align:center'>لا يوجد نتائج 🔍</p>";
    return;
  }

  data.forEach((d) => {
    container.innerHTML += `
      <div class="card">
        <p><b>👤 ${d.name}</b></p>
        <p>📞 ${d.phone}</p>

        <div class="images">
          ${d.cert ? `<img src="${d.cert}">` : ""}
          ${d.id ? `<img src="${d.id}">` : ""}
          ${d.personal ? `<img src="${d.personal}">` : ""}
        </div>

        <button class="btn-delete" onclick="deleteItem('${d.id}')">
          حذف ❌
        </button>
      </div>
    `;
  });
}

// ❌ حذف
window.deleteItem = async (id) => {
  await deleteDoc(doc(db, "students", id));
  loadData();
};

// 🔐 تسجيل خروج
window.logout = () => {
  localStorage.removeItem("auth");
  window.location.href = "login.html";
};

// 🔍 بحث
searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();

  const filtered = allData.filter(item =>
    item.name.toLowerCase().includes(value)
  );

  renderData(filtered);
});

loadData();

</script>

</body>
</html>
