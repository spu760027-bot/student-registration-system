<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Tajawal', sans-serif; background:#eef2f7; }

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  margin-bottom:10px;
}

.btn-delete {
  background:#dc2626;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  margin-top:10px;
}

.logout {
  background:#1e293b;
  color:white;
  padding:8px 12px;
  border-radius:8px;
}
</style>
</head>

<body class="p-5">

<div class="header">
  <h2 class="text-xl font-bold">📊 لوحة التحكم</h2>
  <button class="logout" onclick="logout()">تسجيل خروج</button>
</div>

<div id="data"></div>

<script type="module">

// 🔐 حماية
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "login.html";
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
  storageBucket: "student-system-13431.firebasestorage.app",
  messagingSenderId: "752390660616",
  appId: "1:752390660616:web:72651eb2d96f30b45ee7bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("data");

async function loadData() {
  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "students"));

  querySnapshot.forEach((docItem) => {
    const d = docItem.data();

    container.innerHTML += `
      <div class="card">
        <p><b>👤 الاسم:</b> ${d.name}</p>
        <p><b>📞 الهاتف:</b> ${d.phone}</p>
        <button class="btn-delete" onclick="deleteItem('${docItem.id}')">
          حذف ❌
        </button>
      </div>
    `;
  });
}

// ❌ حذف
window.deleteItem = async (id) => {
  await deleteDoc(doc(db, "students", id));
  loadData();
};

// 🔐 تسجيل خروج
window.logout = () => {
  localStorage.removeItem("auth");
  window.location.href = "login.html";
};

loadData();

</script>

</body>
</html>
