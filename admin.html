<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f1f5f9; font-family:'Tajawal', sans-serif; }

/* Sidebar */
.sidebar {
  width:250px;
  background:#1e293b;
  color:white;
  position:fixed;
  height:100%;
  padding:20px;
}

/* Content */
.content {
  margin-right:250px;
  padding:20px;
}

/* Cards */
.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

/* Student Card */
.student {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

/* Image */
.student img {
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- 🔥 Sidebar -->
<div class="sidebar">
  <h2 class="text-xl font-bold mb-6">🎓 SPU</h2>
  
  <p class="mb-3">📊 لوحة التحكم</p>
  <p class="mb-3">👨‍🎓 الطلبات</p>
  
  <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded mt-5">
    تسجيل خروج
  </button>
</div>

<!-- 🔥 Content -->
<div class="content">

<h1 class="text-2xl font-bold mb-5">📊 لوحة التحكم</h1>

<!-- Stats -->
<div class="grid grid-cols-2 gap-4 mb-5">
  <div class="card">
    <p>عدد الطلبات</p>
    <h2 id="count" class="text-2xl font-bold">0</h2>
  </div>

  <div class="card">
    <p>اليوم</p>
    <h2 id="today" class="text-2xl font-bold">0</h2>
  </div>
</div>

<!-- Search -->
<input id="search" placeholder="🔍 ابحث عن اسم..." 
class="w-full p-3 rounded border mb-4">

<!-- Students -->
<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let students = [];

async function load(){
  const querySnapshot = await getDocs(collection(db,"students"));
  students = [];

  querySnapshot.forEach(docSnap=>{
    students.push({ id: docSnap.id, ...docSnap.data() });
  });

  document.getElementById("count").innerText = students.length;
  show(students);
}

function show(data){
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(s=>{
    list.innerHTML += `
    <div class="student flex justify-between items-center">

      <div>
        <p>👤 ${s.name}</p>
        <p>📞 ${s.phone}</p>
        <p>🎓 ${s.major}</p>

        <div class="flex gap-2 mt-2">
          <img src="${s.cert}">
          <img src="${s.id}">
          <img src="${s.personal}">
        </div>
      </div>

      <button onclick="del('${s.id}')" 
      class="bg-red-500 text-white px-3 py-2 rounded">
        حذف ❌
      </button>

    </div>
    `;
  });
}

/* 🔍 بحث */
document.getElementById("search").addEventListener("input", e=>{
  const value = e.target.value.toLowerCase();
  const filtered = students.filter(s => s.name.toLowerCase().includes(value));
  show(filtered);
});

/* ❌ حذف */
window.del = async (id)=>{
  await deleteDoc(doc(db,"students",id));
  load();
};

/* 🚪 تسجيل خروج */
window.logout = ()=>{
  window.location.href = "login.html";
};

load();

</script>

</body>
</html>
