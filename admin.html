<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body { background:#f1f5f9; font-family:'Tajawal', sans-serif; display:none; }
.sidebar { width:250px; background:#1e293b; color:white; position:fixed; height:100%; padding:20px; }
.content { margin-right:250px; padding:20px; }
.card { background:white; padding:20px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.05); }
.student { background:white; padding:15px; border-radius:12px; margin-top:10px; box-shadow:0 3px 10px rgba(0,0,0,0.05); }
.student img { width:60px; height:60px; border-radius:8px; object-fit:cover; cursor:pointer; }
.tab-active { outline:3px solid #00000020; }

#toast {
position:fixed; top:20px; left:20px;
background:#1e293b; color:white;
padding:12px 20px; border-radius:10px;
opacity:0; transition:.4s;
}

#modal {
position:fixed; top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none; justify-content:center; align-items:center;
}
</style>
</head>

<body>

<div id="toast"></div>

<div id="modal">
  <img id="modalImg" style="max-width:90%;max-height:90%;">
</div>

<div class="sidebar">
  <h2 class="text-xl font-bold mb-6">🎓 SPU</h2>
  <p>📊 Dashboard PRO</p>
  <button id="logoutBtn" class="bg-red-500 px-4 py-2 mt-6 rounded">Logout</button>
</div>

<div class="content">

<h1 class="text-2xl font-bold mb-3">📊 Analytics Dashboard</h1>

<div class="flex gap-2 mb-4 flex-wrap">
<button class="tab bg-gray-800 text-white px-4 py-2 rounded tab-active" data-filter="all">الكل (<span id="cAll">0</span>)</button>
<button class="tab bg-green-600 text-white px-4 py-2 rounded" data-filter="approved">مقبول (<span id="cApproved">0</span>)</button>
<button class="tab bg-red-600 text-white px-4 py-2 rounded" data-filter="rejected">مرفوض (<span id="cRejected">0</span>)</button>
<button class="tab bg-yellow-500 text-white px-4 py-2 rounded" data-filter="pending">قيد المراجعة (<span id="cPending">0</span>)</button>
</div>

<div class="flex gap-3 mb-5">
<button id="excelBtn" class="bg-green-600 text-white px-4 py-2 rounded">Excel 📊</button>
<button id="pdfBtn" class="bg-blue-600 text-white px-4 py-2 rounded">PDF 📄</button>
</div>

<div class="grid grid-cols-2 gap-4 mb-5">
<div class="card"><p>عدد الطلبات</p><h2 id="count">0</h2></div>
<div class="card"><p>عدد الكليات</p><h2 id="majorsCount">0</h2></div>
</div>

<div class="card mb-5">
<p>نسبة القبول</p>
<h2 id="acceptRate">0%</h2>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
<div class="card"><canvas id="barChart"></canvas></div>
<div class="card"><canvas id="pieChart"></canvas></div>
</div>

<input id="search" placeholder="🔍 بحث..." class="w-full p-3 border rounded mb-4">

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
authDomain:"student-system-13431.firebaseapp.com",
projectId:"student-system-13431"
});

const db = getFirestore(app);
const auth = getAuth(app);

let students = [];
let currentFilter = "all";

/* Toast */
function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,3000);
}

/* Auth */
onAuthStateChanged(auth,(user)=>{
if(user){
document.body.style.display="block";
start();
}else{
location.href="login.html";
}
});

/* Live */
function start(){
onSnapshot(collection(db,"students"),(snap)=>{
students=[];
snap.forEach(d=>students.push({id:d.id,...d.data()}));
render();
});
}

/* Render */
function render(){

// counters
let approved=0,rejected=0,pending=0;
students.forEach(s=>{
if(!s.status||s.status.includes("قيد")) pending++;
else if(s.status.includes("مقبول")) approved++;
else rejected++;
});

cAll.innerText=students.length;
cApproved.innerText=approved;
cRejected.innerText=rejected;
cPending.innerText=pending;
count.innerText=students.length;
acceptRate.innerText = students.length?Math.round(approved/students.length*100)+"%":"0%";

// filter
let data=[...students];
if(currentFilter==="approved") data=data.filter(s=>s.status?.includes("مقبول"));
if(currentFilter==="rejected") data=data.filter(s=>s.status?.includes("مرفوض"));
if(currentFilter==="pending") data=data.filter(s=>!s.status||s.status.includes("قيد"));

const val=search.value.toLowerCase();
if(val) data=data.filter(s=>s.name.toLowerCase().includes(val));

list.innerHTML="";
data.forEach(s=>{
list.innerHTML+=`
<div class="student flex justify-between items-center">
<div>
<p>👤 ${s.name}</p>
<p>📞 ${s.phone}</p>
<p>🎓 ${s.major}</p>
<p>📊 ${s.status||"⏳ قيد المراجعة"}</p>

<div class="flex gap-2 mt-2">
<img src="${s.cert}" class="img">
<img src="${s.id}" class="img">
<img src="${s.personal}" class="img">
</div>

<div class="mt-2 flex gap-2">
<button class="approve" data-id="${s.id}">قبول</button>
<button class="reject" data-id="${s.id}">رفض</button>
<button class="pending" data-id="${s.id}">مراجعة</button>
</div>
</div>

<button class="delete" data-id="${s.id}">حذف</button>
</div>
`;
});

// attach events
document.querySelectorAll(".approve").forEach(b=>{
b.onclick=()=>updateStatus(b.dataset.id,"✅ مقبول");
});

document.querySelectorAll(".reject").forEach(b=>{
b.onclick=()=>updateStatus(b.dataset.id,"❌ مرفوض");
});

document.querySelectorAll(".pending").forEach(b=>{
b.onclick=()=>updateStatus(b.dataset.id,"⏳ قيد المراجعة");
});

document.querySelectorAll(".delete").forEach(b=>{
b.onclick=()=>delStudent(b.dataset.id);
});

document.querySelectorAll(".img").forEach(img=>{
img.onclick=()=>{modal.style.display="flex";modalImg.src=img.src};
});

}

/* Actions */
async function updateStatus(id,status){
await updateDoc(doc(db,"students",id),{status});
toast("تم التحديث");
}

async function delStudent(id){
if(!confirm("متأكد؟"))return;
await deleteDoc(doc(db,"students",id));
toast("تم الحذف");
}

/* UI */
search.oninput=render;

document.querySelectorAll(".tab").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("tab-active"));
b.classList.add("tab-active");
currentFilter=b.dataset.filter;
render();
};
});

document.getElementById("logoutBtn").onclick=async()=>{
await signOut(auth);
location.href="login.html";
};

document.getElementById("excelBtn").onclick=()=>{
const data=students.map(s=>({name:s.name,phone:s.phone,major:s.major,status:s.status}));
const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Students");
XLSX.writeFile(wb,"students.xlsx");
};

document.getElementById("pdfBtn").onclick=()=>{
const { jsPDF }=window.jspdf;
const pdf=new jsPDF();
let y=10;
students.forEach(s=>{
pdf.text(`${s.name}`,10,y);
y+=10;
});
pdf.save("students.pdf");
};

</script>
</body>
</html>
