<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
body { background:#f1f5f9; font-family:'Tajawal', sans-serif; display:none; }

.sidebar {
  width:250px;
  background:#1e293b;
  color:white;
  position:fixed;
  height:100%;
  padding:20px;
}

.content {
  margin-right:250px;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.student {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.student img {
  width:60px;
  height:60px;
  border-radius:8px;
  object-fit:cover;
  cursor:pointer;
}

.tab-active {
  outline:3px solid #00000020;
}

#toast {
position:fixed;
top:20px;
left:20px;
background:#1e293b;
color:white;
padding:12px 20px;
border-radius:10px;
opacity:0;
transition:0.4s;
z-index:9999;
}

#modal {
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}
</style>
</head>

<body>

<div id="toast"></div>

<div id="modal">
<img id="modalImg" style="max-width:90%;max-height:90%;">
</div>

<div class="sidebar">
<h2 class="text-xl font-bold mb-6">🎓 SPU</h2>
<p>📊 Dashboard PRO</p>
<button onclick="logout()" class="bg-red-500 px-4 py-2 mt-6 rounded">Logout</button>
</div>

<div class="content">

<h1 class="text-2xl font-bold mb-3">📊 Analytics Dashboard</h1>

<!-- Tabs -->
<div class="flex gap-2 mb-4 flex-wrap">
<button onclick="filterStatus('all', this)" class="tab bg-gray-800 text-white px-4 py-2 rounded tab-active">
الكل (<span id="cAll">0</span>)
</button>

<button onclick="filterStatus('approved', this)" class="tab bg-green-600 text-white px-4 py-2 rounded">
مقبول (<span id="cApproved">0</span>)
</button>

<button onclick="filterStatus('rejected', this)" class="tab bg-red-600 text-white px-4 py-2 rounded">
مرفوض (<span id="cRejected">0</span>)
</button>

<button onclick="filterStatus('pending', this)" class="tab bg-yellow-500 text-white px-4 py-2 rounded">
قيد المراجعة (<span id="cPending">0</span>)
</button>
</div>

<!-- Export -->
<div class="flex gap-3 mb-5">
<button onclick="exportExcel()" class="bg-green-600 text-white px-4 py-2 rounded">Excel 📊</button>
<button onclick="exportPDF()" class="bg-blue-600 text-white px-4 py-2 rounded">PDF 📄</button>
</div>

<!-- Stats -->
<div class="grid grid-cols-2 gap-4 mb-5">
<div class="card">
<p>عدد الطلبات</p>
<h2 id="count" class="text-2xl font-bold">0</h2>
</div>

<div class="card">
<p>عدد الكليات</p>
<h2 id="majorsCount" class="text-2xl font-bold">0</h2>
</div>
</div>

<!-- نسبة القبول -->
<div class="card mb-5">
<p>نسبة القبول</p>
<h2 id="acceptRate" class="text-2xl font-bold">0%</h2>
</div>

<!-- Charts -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
<div class="card"><canvas id="barChart"></canvas></div>
<div class="card"><canvas id="pieChart"></canvas></div>
</div>

<!-- Search -->
<input id="search" placeholder="🔍 بحث..." class="w-full p-3 border rounded mb-4">

<!-- List -->
<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
authDomain:"student-system-13431.firebaseapp.com",
projectId:"student-system-13431"
});

const db = getFirestore(app);
const auth = getAuth(app);

let students=[];
let currentFilter="all";
let barChart, pieChart;

/* Toast */
function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,3000);
}

/* Auth */
onAuthStateChanged(auth,(user)=>{
if(user){
document.body.style.display="block";
startLive();
}else{
location.href="login.html";
}
});

/* Live */
function startLive(){
onSnapshot(collection(db,"students"),(snap)=>{
students=[];
snap.forEach(d=>students.push({id:d.id,...d.data()}));

count.innerText=students.length;

buildCharts();
updateCounters();
applyFilters();
});
}

/* Counters */
function updateCounters(){
let approved=0,rejected=0,pending=0;

students.forEach(s=>{
if(!s.status || s.status.includes("قيد")) pending++;
else if(s.status.includes("مقبول")) approved++;
else if(s.status.includes("مرفوض")) rejected++;
});

cAll.innerText=students.length;
cApproved.innerText=approved;
cRejected.innerText=rejected;
cPending.innerText=pending;

acceptRate.innerText = students.length ? Math.round((approved/students.length)*100)+"%" : "0%";
}

/* Charts */
function buildCharts(){
const majors={};
students.forEach(s=>majors[s.major]=(majors[s.major]||0)+1);

majorsCount.innerText=Object.keys(majors).length;

const labels=Object.keys(majors);
const data=Object.values(majors);

if(barChart) barChart.destroy();
if(pieChart) pieChart.destroy();

barChart=new Chart(document.getElementById("barChart"),{
type:"bar",
data:{labels,datasets:[{label:"عدد الطلاب",data}]}
});

pieChart=new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{labels,datasets:[{data}]}
});
}

/* Filter */
window.filterStatus=(type,el)=>{
currentFilter=type;

document.querySelectorAll(".tab").forEach(b=>b.classList.remove("tab-active"));
if(el) el.classList.add("tab-active");

applyFilters();
};

function applyFilters(){
let filtered=[...students];

if(currentFilter==="approved") filtered=filtered.filter(s=>s.status?.includes("مقبول"));
if(currentFilter==="rejected") filtered=filtered.filter(s=>s.status?.includes("مرفوض"));
if(currentFilter==="pending") filtered=filtered.filter(s=>!s.status || s.status.includes("قيد"));

const q=search.value.toLowerCase();
if(q) filtered=filtered.filter(s=>s.name.toLowerCase().includes(q));

show(filtered);
}

/* Show */
function show(data){
list.innerHTML="";

data.forEach(s=>{
list.innerHTML+=`
<div class="student flex justify-between items-center">

<div>
<p>👤 ${s.name}</p>
<p>📞 ${s.phone}</p>
<p>🎓 ${s.major}</p>
<p>📊 ${s.status||"⏳ قيد المراجعة"}</p>

<div class="flex gap-2 mt-2">
<img src="${s.cert}" onclick="openImg('${s.cert}')">
<img src="${s.id}" onclick="openImg('${s.id}')">
<img src="${s.personal}" onclick="openImg('${s.personal}')">
</div>

<div class="mt-2 flex gap-2">
<button onclick="updateStatus('${s.id}','✅ مقبول')" class="bg-green-600 text-white px-2 py-1 rounded">قبول</button>
<button onclick="updateStatus('${s.id}','❌ مرفوض')" class="bg-red-600 text-white px-2 py-1 rounded">رفض</button>
<button onclick="updateStatus('${s.id}','⏳ قيد المراجعة')" class="bg-yellow-500 text-white px-2 py-1 rounded">مراجعة</button>
</div>
</div>

<button onclick="del('${s.id}')" class="bg-red-500 text-white px-3 py-2 rounded">حذف</button>

</div>
`;
});
}

/* 🔥 DELETE FIXED */
window.del = async(id)=>{
if(!confirm("متأكد من الحذف؟")) return;

try {
await deleteDoc(doc(db,"students",id));
toast("✅ تم الحذف");
} catch(e){
console.error(e);
alert("❌ " + e.message);
}
};

/* Update */
window.updateStatus = async(id,status)=>{
await updateDoc(doc(db,"students",id),{status});
toast("تم التحديث");
};

/* Image */
window.openImg=(src
