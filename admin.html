<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
body { background:#f1f5f9; font-family:'Tajawal', sans-serif; display:none; }

.sidebar {
  width:250px;
  background:#1e293b;
  color:white;
  position:fixed;
  height:100%;
  padding:20px;
}

.content {
  margin-right:250px;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.student {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.student img {
  width:60px;
  height:60px;
  border-radius:8px;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2 class="text-xl font-bold mb-6">🎓 SPU</h2>
  <p>📊 Dashboard</p>
  <button onclick="logout()" class="bg-red-500 px-4 py-2 mt-6 rounded">Logout</button>
</div>

<div class="content">

<h1 class="text-2xl font-bold mb-3">📊 Analytics Dashboard</h1>

<div class="flex gap-3 mb-5">
  <button onclick="exportExcel()" class="bg-green-600 text-white px-4 py-2 rounded">
    تحميل Excel 📊
  </button>

  <button onclick="exportPDF()" class="bg-blue-600 text-white px-4 py-2 rounded">
    تحميل PDF 📄
  </button>
</div>

<div class="grid grid-cols-2 gap-4 mb-5">
  <div class="card">
    <p>عدد الطلبات</p>
    <h2 id="count" class="text-2xl font-bold">0</h2>
  </div>

  <div class="card">
    <p>عدد الكليات</p>
    <h2 id="majorsCount" class="text-2xl font-bold">0</h2>
  </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
  <div class="card">
    <canvas id="barChart"></canvas>
  </div>

  <div class="card">
    <canvas id="pieChart"></canvas>
  </div>
</div>

<input id="search" placeholder="🔍 بحث..." class="w-full p-3 border rounded mb-4">

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 🔐 حماية */
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.body.style.display = "block";
    load();
  } else {
    window.location.href = "login.html";
  }
});

let students = [];

async function load(){
  const snapshot = await getDocs(collection(db,"students"));
  students = [];

  snapshot.forEach(d=>{
    students.push({ id:d.id, ...d.data() });
  });

  document.getElementById("count").innerText = students.length;

  buildCharts();
  show(students);
}

/* Charts */
function buildCharts(){

  const majors = {};

  students.forEach(s=>{
    majors[s.major] = (majors[s.major] || 0) + 1;
  });

  document.getElementById("majorsCount").innerText = Object.keys(majors).length;

  const labels = Object.keys(majors);
  const data = Object.values(majors);

  new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: { labels, datasets: [{ label: "عدد الطلاب", data }] }
  });

  new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: { labels, datasets: [{ data }] }
  });
}

/* عرض الطلاب */
function show(data){
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(s=>{
    list.innerHTML += `
    <div class="student flex justify-between items-center">

      <div>
        <p>🆔 ${s.id}</p>
        <p>👤 ${s.name}</p>
        <p>📞 ${s.phone}</p>
        <p>🎓 ${s.major}</p>
        <p>📊 <b>${s.status || "⏳ قيد المراجعة"}</b></p>

        <div class="flex gap-2 mt-2">
          <img src="${s.cert}">
          <img src="${s.id}">
          <img src="${s.personal}">
        </div>

        <div class="mt-2 flex gap-2">
          <button onclick="updateStatus('${s.id}','✅ مقبول')" class="bg-green-600 text-white px-3 py-1 rounded">قبول</button>
          <button onclick="updateStatus('${s.id}','❌ مرفوض')" class="bg-red-600 text-white px-3 py-1 rounded">رفض</button>
          <button onclick="updateStatus('${s.id}','⏳ قيد المراجعة')" class="bg-yellow-500 text-white px-3 py-1 rounded">مراجعة</button>
        </div>

      </div>

      <button onclick="del('${s.id}')" class="bg-red-500 text-white px-3 py-2 rounded">
        حذف ❌
      </button>

    </div>
    `;
  });
}

/* Search */
document.getElementById("search").addEventListener("input", e=>{
  const v = e.target.value.toLowerCase();
  const filtered = students.filter(s => s.name.toLowerCase().includes(v));
  show(filtered);
});

/* Delete */
window.del = async (id)=>{
  await deleteDoc(doc(db,"students",id));
  load();
};

/* 🔥 تحديث الحالة */
window.updateStatus = async (id, status)=>{
  await updateDoc(doc(db,"students",id), { status });
  load();
};

/* Logout */
window.logout = async ()=>{
  await signOut(auth);
  window.location.href="login.html";
};

/* Excel */
window.exportExcel = () => {
  const data = students.map(s => ({
    الاسم: s.name,
    الهاتف: s.phone,
    الكلية: s.major,
    الحالة: s.status
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Students");
  XLSX.writeFile(wb, "students.xlsx");
};

/* PDF */
window.exportPDF = () => {

  const docPdf = new jspdf.jsPDF();
  let y = 10;

  students.forEach((s, i) => {
    docPdf.text(`${i+1}. ${s.name} - ${s.phone} - ${s.major} - ${s.status}`, 10, y);
    y += 10;

    if (y > 280) {
      docPdf.addPage();
      y = 10;
    }
  });

  docPdf.save("students.pdf");
};

</script>

</body>
</html>
