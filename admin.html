<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Tajawal', sans-serif; background:#eef2f7; }

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  margin-bottom:10px;
}

.btn-delete {
  background:#dc2626;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  margin-top:10px;
}

.logout {
  background:#1e293b;
  color:white;
  padding:8px 12px;
  border-radius:8px;
}

.search {
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body class="p-5">

<div class="header">
  <div>
    <p style="color:gray;">نظام إدارة الطلبات - SPU</p>
    <h2 class="text-xl font-bold">📊 لوحة التحكم</h2>
    <p id="count" style="margin-top:5px;color:gray;">عدد الطلبات: 0</p>
  </div>
  <button class="logout" onclick="logout()">تسجيل خروج</button>
</div>

<input id="search" class="search" placeholder="🔍 ابحث عن اسم...">

<div id="data"></div>

<script type="module">

// 🔐 حماية الصفحة
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "login.html";
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
  storageBucket: "student-system-13431.firebasestorage.app",
  messagingSenderId: "752390660616",
  appId: "1:752390660616:web:72651eb2d96f30b45ee7bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("data");
const searchInput = document.getElementById("search");
const countEl = document.getElementById("count");

let allData = [];

async function loadData() {
  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "students"));

  // 🔥 العداد (مهم جدًا)
  countEl.innerText = "عدد الطلبات: " + querySnapshot.size;

  if (querySnapshot.empty) {
    container.innerHTML = "<p style='text-align:center'>لا يوجد طلبات بعد 📭</p>";
    return;
  }

  const docs = [];
  querySnapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));

  allData = docs.reverse();
  renderData(allData);
}

function renderData(data) {
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = "<p style='text-align:center'>لا يوجد نتائج 🔍</p>";
    return;
  }

  data.forEach((d) => {
    container.innerHTML += `
      <div class="card">
        <p><b>👤 الاسم:</b> ${d.name}</p>
        <p><b>📞 الهاتف:</b> ${d.phone}</p>
        <button class="btn-delete" onclick="deleteItem('${d.id}')">
          حذف ❌
        </button>
      </div>
    `;
  });
}

// ❌ حذف
window.deleteItem = async (id) => {
  await deleteDoc(doc(db, "students", id));
  loadData();
};

// 🔐 تسجيل خروج
window.logout = () => {
  localStorage.removeItem("auth");
  window.location.href = "login.html";
};

// 🔍 البحث
searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();

  const filtered = allData.filter(item =>
    item.name.toLowerCase().includes(value)
  );

  renderData(filtered);
});

loadData();

</script>

</body>
</html>
