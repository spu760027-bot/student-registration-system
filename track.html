<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع الطلب | SPU</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg,#1e295a,#8e1a1e);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Tajawal';
}

/* Card */
.card {
  background:white;
  color:#1e293b;
  padding:30px;
  border-radius:20px;
  width:340px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  animation:fadeUp 0.7s ease;
}

/* Animation */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

/* Status */
.statusBox {
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  font-weight:bold;
  transition:0.4s;
}

.pending { background:#facc15; color:black; }
.approved { background:#16a34a; color:white; }
.rejected { background:#dc2626; color:white; }

/* Toast */
#toast {
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 20px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation:slideIn 0.5s ease;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity:0; }
  to { transform: translateX(0); opacity:1; }
}
</style>
</head>

<body>

<div class="card">

<h2 class="text-xl font-bold mb-4">📋 تتبع طلبك</h2>

<input id="id" class="w-full p-2 border rounded mb-3" placeholder="أدخل رقم الطلب">

<button onclick="check()" class="bg-blue-600 text-white px-4 py-2 rounded w-full">
تحقق
</button>

<div id="result" class="mt-4"></div>

</div>

<!-- Toast -->
<div id="toast" class="hidden"></div>

<!-- Sound -->
<audio id="notifySound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
});

const db = getFirestore(app);

let lastStatus = "";

/* Auto fill */
const saved = localStorage.getItem("requestId");
if (saved) document.getElementById("id").value = saved;

/* Toast */
function showToast(message, type){

  const toast = document.getElementById("toast");

  let color = "#2563eb";
  if (type === "success") color = "#16a34a";
  if (type === "error") color = "#dc2626";

  toast.style.background = color;
  toast.innerText = message;
  toast.classList.remove("hidden");

  document.getElementById("notifySound").play();

  setTimeout(()=>{
    toast.classList.add("hidden");
  },3000);
}

/* Render Status */
function renderStatus(status){

  let cls = "pending";
  if (status.includes("مقبول")) cls = "approved";
  if (status.includes("مرفوض")) cls = "rejected";

  document.getElementById("result").innerHTML =
    `<div class="statusBox ${cls}">📊 الحالة: ${status}</div>`;
}

/* Check */
window.check = async () => {

  const id = document.getElementById("id").value;
  const result = document.getElementById("result");

  if (!id) {
    result.innerHTML = "❌ أدخل رقم الطلب";
    return;
  }

  const ref = doc(db, "students", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    result.innerHTML = "❌ الطلب غير موجود";
    return;
  }

  const data = snap.data();

  lastStatus = data.status;
  renderStatus(data.status);
};

/* 🔔 Auto Update */
setInterval(async () => {

  const id = document.getElementById("id").value;
  if (!id) return;

  const ref = doc(db, "students", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) return;

  const data = snap.data();

  if (lastStatus && lastStatus !== data.status) {
    showToast("🔔 تم تحديث الحالة: " + data.status, "success");
    renderStatus(data.status);
  }

  lastStatus = data.status;

}, 5000);

</script>

</body>
</html>
