<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع الطلب | SPU LIVE</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg,#1e295a,#8e1a1e);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Tajawal';
}

.card {
  background:white;
  color:#1e293b;
  padding:30px;
  border-radius:20px;
  width:340px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.statusBox {
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  font-weight:bold;
  transition:0.4s;
}

.pending { background:#facc15; color:black; }
.approved { background:#16a34a; color:white; }
.rejected { background:#dc2626; color:white; }

#toast {
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 20px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation:slideIn 0.5s ease;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity:0; }
  to { transform: translateX(0); opacity:1; }
}
</style>
</head>

<body>

<div class="card">

<h2 class="text-xl font-bold mb-4">📋 تتبع طلبك (LIVE)</h2>

<input id="id" class="w-full p-2 border rounded mb-3" placeholder="أدخل رقم الطلب">

<button onclick="startLive()" class="bg-blue-600 text-white px-4 py-2 rounded w-full">
تشغيل التتبع المباشر 🚀
</button>

<div id="result" class="mt-4"></div>

</div>

<div id="toast" class="hidden"></div>

<audio id="notifySound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDYZC_aNEgOOIbbfaeF3eqf8KpBuH8fEIE",
  authDomain: "student-system-13431.firebaseapp.com",
  projectId: "student-system-13431",
});

const db = getFirestore(app);

let lastStatus = "";

/* Toast */
function showToast(message){

  const toast = document.getElementById("toast");

  toast.style.background = "#16a34a";
  toast.innerText = message;
  toast.classList.remove("hidden");

  document.getElementById("notifySound").play();

  setTimeout(()=>{
    toast.classList.add("hidden");
  },3000);
}

/* Render */
function renderStatus(status){

  let cls = "pending";
  if (status.includes("مقبول")) cls = "approved";
  if (status.includes("مرفوض")) cls = "rejected";

  document.getElementById("result").innerHTML =
    `<div class="statusBox ${cls}">📊 الحالة: ${status}</div>`;
}

/* LIVE 🔥 */
window.startLive = () => {

  const id = document.getElementById("id").value;

  if (!id) {
    alert("❌ أدخل رقم الطلب");
    return;
  }

  const ref = doc(db, "students", id);

  onSnapshot(ref, (snap) => {

    if (!snap.exists()) return;

    const data = snap.data();

    if (lastStatus && lastStatus !== data.status) {
      showToast("🔔 تم تحديث الحالة: " + data.status);
    }

    lastStatus = data.status;
    renderStatus(data.status);

  });

};

/* Auto fill */
const saved = localStorage.getItem("requestId");
if (saved) document.getElementById("id").value = saved;

</script>

</body>
</html>
