<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الأدمن</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f1f5f9; font-family:sans-serif; }
.box { background:white; padding:20px; border-radius:12px; max-width:400px; margin:100px auto; }
.input { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; margin-bottom:10px; }
.btn { background:#1e293b; color:white; padding:10px; width:100%; border-radius:8px; }
</style>
</head>

<body>

<div class="box">

<h2 class="text-lg mb-4 text-center">🔐 تسجيل دخول الأدمن</h2>

<input id="user" class="input" placeholder="اسم المستخدم">
<input id="pass" type="password" class="input" placeholder="كلمة المرور">

<button class="btn" onclick="login()">دخول</button>

<p id="msg" class="text-center mt-3"></p>

</div>

<script>
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if (user === "admin" && pass === "1234") {
    localStorage.setItem("auth", "true");
    window.location.href = "admin.html";
  } else {
    document.getElementById("msg").innerText = "بيانات خاطئة ❌";
  }
}
</script>

</body>
</html>
